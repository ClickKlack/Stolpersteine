                                    <label>
                                        Beschreibung
                                        <textarea x-model="form.beschreibung" rows="2" :disabled="saving" placeholder="z.B. vor dem Eingang, linke Seite …"></textarea>
                                    </label>

                                    <label>
                                        Historische Bemerkung
                                        <textarea x-model="form.bemerkung_historisch" rows="2" :disabled="saving" placeholder="Frühere Adresse, Umbenennungen …"></textarea>
                                    </label>

                                    <!-- Raster -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Raster</legend>
                                        <div class="grid" style="align-items:end;">
                                            <label style="margin:0;">
                                                Spalten
                                                <input type="number" x-model="form.grid_n" min="1" max="10" placeholder="z.B. 3" :disabled="saving" style="margin:0;">
                                            </label>
                                            <label style="margin:0;">
                                                Zeilen
                                                <input type="number" x-model="form.grid_m" min="1" max="10" placeholder="z.B. 3" :disabled="saving" style="margin:0;">
                                            </label>
                                        </div>
                                        <label style="margin-top:0.5rem;">
                                            Sonderform-Beschreibung
                                            <input type="text" x-model="form.raster_beschreibung" :disabled="saving" placeholder="z.B. L-Form, Ecke fehlt oben rechts …" style="margin:0;">
                                        </label>
                                    </fieldset>

                                    <label>
                                        Status
                                        <select x-model="form.status" :disabled="saving">
                                            <option value="validierung">Validierung</option>
                                            <option value="ok">Ok</option>
                                        </select>
                                    </label>

                                    <template x-if="formError">
                                        <p style="color:var(--pico-del-color);" x-text="formError"></p>
                                    </template>

                                    <footer style="display:flex; justify-content:flex-end; gap:0.5rem;">
                                        <button type="button" class="outline" @click="closeModal()" :disabled="saving">Abbrechen</button>
                                        <button type="submit" :aria-busy="saving" :disabled="saving">Speichern</button>
                                    </footer>
                                </form>
                            </article>
                        </dialog>

                        <!-- Modal: Kartenvorschau -->
                        <dialog :open="mapPreview.open" @keydown.escape.window="if(mapPreview.open) closeMapPreview()">
                            <article style="max-width:560px;">
                                <header style="display:flex; align-items:center; justify-content:space-between;">
                                    <h3 style="margin:0;" x-text="mapPreview.adresse"></h3>
                                    <button type="button" class="btn-icon btn-outlined" @click="closeMapPreview()" aria-label="Schließen"
                                            style="font-size:1rem; font-weight:700; margin:0;">✕</button>
                                </header>
                                <div id="map-preview" style="height:340px; border-radius:var(--pico-border-radius); overflow:hidden;"></div>
                            </article>
                        </dialog>

                        <!-- Modal: Löschen bestätigen -->
                        <dialog :open="deleteConfirmOpen" @keydown.escape.window="if(deleteConfirmOpen) closeDelete()">
                            <article>
                                <header><h3>Verlegeort löschen</h3></header>
                                <p>
                                    Soll <strong x-text="deleteOrtName"></strong> wirklich gelöscht werden?<br>
                                    <small style="color:var(--pico-muted-color);">Verknüpfte Stolpersteine müssen vorher entfernt werden.</small>
                                </p>
                                <footer style="display:flex; justify-content:flex-end; gap:0.5rem;">
                                    <button class="outline" @click="closeDelete()" :disabled="deleting">Abbrechen</button>
                                    <button style="background:var(--pico-del-color); border-color:var(--pico-del-color);"
                                            @click="doDelete()" :aria-busy="deleting" :disabled="deleting">
                                        Löschen
                                    </button>
                                </footer>
                            </article>
                        </dialog>

                    </div>
                </template>

                <!-- Dokumente (Platzhalter) -->
                <template x-if="router.is('dokumente')">
                    <div x-data="dokumentePage" @keydown.escape.window="closeTopModal()">

                        <!-- Kopfzeile -->
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem;">
                            <h2 style="margin:0;">Dokumente</h2>
                            <button @click="openCreate()">+ Dokument anlegen</button>
                        </div>

                        <!-- Filter -->
                        <div style="display:flex; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center;">
                            <!-- Personensuche -->
                            <div style="position:relative; flex:0 0 230px;">
                                <input type="text" placeholder="Person suchen…"
                                       x-model="personSuchtext"
                                       @input="onPersonInput()"
                                       @blur="setTimeout(() => personSucheAktiv = false, 200)"
                                       style="margin:0; width:100%;">
                                <template x-if="selectedPerson">
                                    <button type="button"
                                            @click.prevent="clearPersonFilter()"
                                            style="position:absolute; right:6px; top:50%; transform:translateY(-50%);
                                                   padding:0 5px; background:none; border:none; cursor:pointer;
                                                   color:var(--pico-muted-color); font-size:0.9rem; line-height:1;">✕</button>
                                </template>
                                <template x-if="personSucheAktiv && personVorschlaege.length > 0">
                                    <div style="position:absolute; top:calc(100% + 2px); left:0; right:0;
                                                background:var(--pico-card-background-color, #fff);
                                                border:1px solid var(--pico-muted-border-color);
                                                border-radius:var(--pico-border-radius, 4px);
                                                z-index:200; max-height:260px; overflow-y:auto;
                                                box-shadow:0 4px 14px rgba(0,0,0,.15);">
                                        <template x-for="person in personVorschlaege" :key="person.id">
                                            <div @mousedown.prevent="selectPerson(person)"
                                                 style="padding:0.45rem 0.75rem; cursor:pointer; font-size:0.9rem;"
                                                 @mouseover="$el.style.background='var(--pico-secondary-background, #f0f0f0)'"
                                                 @mouseout="$el.style.background=''">
                                                <span x-text="person.nachname + (person.vorname ? ', ' + person.vorname : '')"></span>
                                                <template x-if="person.geburtsdatum">
                                                    <span style="color:var(--pico-muted-color); font-size:0.82em;"
                                                          x-text="' *' + person.geburtsdatum.substring(0,4)"></span>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>

                            <!-- Typ-Filter -->
                            <select x-model="filter.typ" @change="load()" style="flex:0 0 130px; margin:0;">
                                <option value="">Alle Typen</option>
                                <option value="pdf">PDF</option>
                                <option value="url">URL</option>
                                <option value="foto">Foto</option>
                                <option value="scan">Scan</option>
                            </select>

                            <!-- URL-Fehler-Filter -->
                            <label style="display:flex; align-items:center; gap:0.4rem; margin:0; cursor:pointer; white-space:nowrap; font-size:0.9rem;">
                                <input type="checkbox" x-model="filter.url_fehler" @change="load()" style="margin:0;">
                                Nur URL-Fehler
                            </label>

                            <!-- Aktualisieren (kompakt) -->
                            <button class="outline" @click="load()"
                                    style="width:auto; margin:0; padding:0.5rem 0.8rem;">↺</button>

                            <!-- Alle sichtbaren URLs prüfen -->
                            <button class="outline secondary" @click="checkAllVisible()"
                                    :disabled="checkingAll || downloadingAll || !dokumente.some(d => d.quelle_url)"
                                    style="width:auto; margin:0; padding:0.5rem 0.8rem; white-space:nowrap;"
                                    title="Alle sichtbaren URLs auf Erreichbarkeit prüfen">
                                <span x-show="!checkingAll">✓ Alle prüfen</span>
                                <span x-show="checkingAll"
                                      x-text="'✓ ' + checkAllProgress.done + ' / ' + checkAllProgress.total"></span>
                            </button>

                            <!-- Alle sichtbaren Dokumente herunterladen -->
                            <button class="outline secondary" @click="downloadAll()"
                                    :disabled="downloadingAll || checkingAll || !dokumente.some(d => d.quelle_url)"
                                    style="width:auto; margin:0; padding:0.5rem 0.8rem; white-space:nowrap;"
                                    title="Alle sichtbaren Dokumente herunterladen, lokal spiegeln und URL-Status aktualisieren">
                                <span x-show="!downloadingAll">↓ Alle herunterladen</span>
                                <span x-show="downloadingAll"
                                      x-text="'↓ ' + downloadAllProgress.done + ' / ' + downloadAllProgress.total"></span>
                            </button>
                        </div>

                        <!-- Fehlermeldung -->
                        <template x-if="error">
                            <div class="error-banner" x-text="error"></div>
                        </template>

                        <!-- Tabelle -->
                        <template x-if="!loading && !error && dokumente.length === 0">
                            <p style="color:var(--pico-muted-color);">Keine Dokumente gefunden.</p>
                        </template>

                        <template x-if="dokumente.length > 0">
                            <div class="table-responsive">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Titel</th>
                                            <th>Typ</th>
                                            <th>URL / Datei</th>
                                            <th>Quelle</th>
                                            <th>Größe</th>
                                            <th>URL-Status</th>
                                            <th>Spiegel</th>
                                            <th>Personen</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="dok in dokumente" :key="dok.id">
                                            <tr @click="openEdit(dok)"
                                                class="tr-clickable">
                                                <td x-text="dok.titel"></td>
                                                <td x-text="typLabel(dok.typ)"></td>
                                                <td @click.stop>
                                                    <template x-if="dok.quelle_url">
                                                        <a :href="dok.quelle_url" target="_blank" rel="noopener"
                                                           x-text="dok.dateiname || dok.quelle_url"
                                                           style="word-break:break-all; font-size:0.85em;"></a>
                                                    </template>
                                                    <template x-if="!dok.quelle_url && dok.dateiname">
                                                        <span x-text="dok.dateiname" style="font-size:0.85em;"></span>
                                                    </template>
                                                </td>
                                                <td x-text="dok.quelle || '–'" style="font-size:0.85em;"></td>
                                                <td x-text="formatGroesse(dok.groesse_bytes)"></td>
                                                <td>
                                                    <template x-if="dok.quelle_url">
                                                        <span>
                                                            <span :class="urlStatusClass(dok.url_status)"
                                                                  x-text="urlStatusLabel(dok.url_status)"></span>
                                                            <small x-show="dok.url_geprueft_am"
                                                                   style="display:block; color:var(--pico-muted-color); font-size:0.78em;"
                                                                   x-text="formatDate(dok.url_geprueft_am)"></small>
                                                        </span>
                                                    </template>
                                                    <template x-if="!dok.quelle_url">
                                                        <span>–</span>
                                                    </template>
                                                </td>
                                                <td @click.stop>
                                                    <template x-if="dok.spiegel_pfad && isAdmin">
                                                        <a :href="CONFIG.apiBase + '/dokumente/' + dok.id + '/spiegel'"
                                                           target="_blank" rel="noopener"
                                                           x-text="formatGroesse(dok.spiegel_groesse_bytes)"
                                                           title="Lokale Kopie öffnen"></a>
                                                    </template>
                                                    <template x-if="dok.spiegel_pfad && !isAdmin">
                                                        <span title="Lokale Kopie vorhanden"
                                                              x-text="formatGroesse(dok.spiegel_groesse_bytes)"></span>
                                                    </template>
                                                    <template x-if="!dok.spiegel_pfad">
                                                        <span style="color:var(--pico-muted-color);">–</span>
                                                    </template>
                                                </td>
                                                <td x-text="dok.person_ids?.length ?? 0"></td>
                                                <td @click.stop>
                                                    <div style="display:grid; grid-template-columns: repeat(4, 2rem); gap:0.25rem;">
                                                        <button class="btn-icon btn-outlined"
                                                                @click="openEdit(dok)"
                                                                title="Bearbeiten">✎</button>
                                                        <button class="btn-icon btn-outlined"
                                                                :style="dok.quelle_url ? '' : 'visibility:hidden; pointer-events:none'"
                                                                :disabled="isChecking(dok.id)"
                                                                @click="checkUrl(dok)"
                                                                title="URL prüfen">
                                                            <span x-show="!isChecking(dok.id)">✓</span>
                                                            <span x-show="isChecking(dok.id)">…</span>
                                                        </button>
                                                        <button class="btn-icon btn-outlined"
                                                                :style="(dok.typ === 'pdf' && dok.quelle_url) ? '' : 'visibility:hidden; pointer-events:none'"
                                                                :disabled="isMirroring(dok.id)"
                                                                @click="mirrorPdf(dok)"
                                                                title="PDF lokal spiegeln">
                                                            <span x-show="!isMirroring(dok.id)">↓</span>
                                                            <span x-show="isMirroring(dok.id)">…</span>
                                                        </button>
                                                        <button class="btn-icon btn-outlined btn-delete"
                                                                @click="openDelete(dok)"
                                                                title="Löschen">✕</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>

                        <!-- Anlegen / Bearbeiten-Dialog -->
                        <dialog :open="modalOpen" x-show="modalOpen">
                            <article style="max-width:520px;">
                                <header>
                                    <button aria-label="Schließen" rel="prev" @click="modalOpen = false"></button>
                                    <h3 x-text="editId ? 'Dokument bearbeiten' : 'Dokument anlegen'"></h3>
                                </header>
                                <form @submit.prevent="save()">

                                    <!-- URL mit Refresh-Button -->
                                    <label>Externe URL *</label>
                                    <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:0.75rem;">
                                        <input type="url" x-model="form.quelle_url"
                                               placeholder="https://…"
                                               @blur="fetchUrlInfo()"
                                               style="flex:1; margin:0;" required>
                                        <button type="button" class="outline secondary"
                                                @click="fetchUrlInfo()"
                                                :disabled="urlInfoLaden"
                                                style="width:auto; margin:0; padding:0.45rem 0.7rem;"
                                                title="Metadaten neu laden">
                                            <span x-show="!urlInfoLaden">↺</span>
                                            <span x-show="urlInfoLaden">…</span>
                                        </button>
                                    </div>
                                    <div style="display:flex; gap:1rem; margin-top:0.25rem; flex-wrap:wrap;">
                                        <template x-if="savedUrlStatus !== null && fetchedUrlStatus === null">
                                            <small :class="urlStatusClass(savedUrlStatus)"
                                                   x-text="'Gespeicherter Status: ' + urlStatusLabel(savedUrlStatus)
                                                       + (savedUrlGeprueftAm ? ' (geprüft: ' + formatDate(savedUrlGeprueftAm) + ')' : '')"></small>
                                        </template>
                                        <template x-if="fetchedUrlStatus !== null">
                                            <small :class="urlStatusClass(fetchedUrlStatus)"
                                                   x-text="'Aktueller Status: ' + urlStatusLabel(fetchedUrlStatus)"></small>
                                        </template>
                                    </div>

                                    <!-- Titel (auto-gefüllt) -->
                                    <label>
                                        Titel *
                                        <input type="text" x-model="form.titel" required>
                                    </label>

                                    <!-- Typ + Größe nebeneinander -->
                                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                                        <label style="margin:0;">
                                            Typ
                                            <select x-model="form.typ" style="margin-top:0.25rem;">
                                                <option value="pdf">PDF</option>
                                                <option value="url">URL</option>
                                                <option value="foto">Foto</option>
                                                <option value="scan">Scan</option>
                                            </select>
                                        </label>
                                        <label style="margin:0;">
                                            Größe (Bytes)
                                            <input type="number" x-model="form.groesse_bytes"
                                                   min="0" style="margin-top:0.25rem;">
                                        </label>
                                    </div>

                                    <!-- Personen -->
                                    <label style="margin-top:0.75rem; display:block;">Personen</label>

                                    <!-- Liste zugeordneter Personen -->
                                    <template x-if="form.personen.length > 0">
                                        <ul style="margin:0 0 0.5rem; padding:0; list-style:none;">
                                            <template x-for="(person, idx) in form.personen" :key="person.id">
                                                <li style="display:flex; align-items:center; gap:0.5rem;
                                                           padding:0.3rem 0; border-bottom:1px solid var(--pico-muted-border-color);">
                                                    <span style="flex:1; font-size:0.9rem;"
                                                          x-text="person.nachname + (person.vorname ? ', ' + person.vorname : '') + (person.geburtsdatum ? ' *' + person.geburtsdatum.substring(0,4) : '')"></span>
                                                    <button type="button"
                                                            @click="toggleBiografie(person, idx)"
                                                            class="btn-icon btn-outlined"
                                                            :style="person.ist_biografie ? 'color: var(--pico-primary);' : ''"
                                                            :title="person.ist_biografie ? 'Biografie-Dokument entfernen' : 'Als Biografie-Dokument setzen'">
                                                        <span x-text="person.ist_biografie ? '★' : '☆'"></span>
                                                    </button>
                                                    <button type="button"
                                                            @click="removeFormPerson(idx)"
                                                            class="btn-icon btn-outlined btn-delete"
                                                            title="Entfernen">–</button>
                                                </li>
                                            </template>
                                        </ul>
                                    </template>

                                    <!-- Person-Suchzeile -->
                                    <div style="position:relative; margin-bottom:0.75rem;">
                                        <div style="display:flex; gap:0.5rem; align-items:center;">
                                            <input type="text"
                                                   x-model="formPersonSuchtext"
                                                   @input="onFormPersonInput()"
                                                   @blur="setTimeout(() => formPersonSucheAktiv = false, 200)"
                                                   placeholder="Name, Vorname oder Geburtsname…"
                                                   style="flex:1; margin:0;">
                                            <template x-if="formPersonVorschlaege.length > 0 && formPersonSucheAktiv">
                                                <span style="color:var(--pico-muted-color); font-size:0.8rem; white-space:nowrap;">
                                                    ↑ auswählen
                                                </span>
                                            </template>
                                        </div>
                                        <!-- Dropdown -->
                                        <template x-if="formPersonSucheAktiv && formPersonVorschlaege.length > 0">
                                            <div style="position:absolute; top:calc(100% + 2px); left:0; right:0;
                                                        background:var(--pico-card-background-color, #fff);
                                                        border:1px solid var(--pico-muted-border-color);
                                                        border-radius:var(--pico-border-radius, 4px);
                                                        z-index:300; max-height:220px; overflow-y:auto;
                                                        box-shadow:0 4px 14px rgba(0,0,0,.15);">
                                                <template x-for="person in formPersonVorschlaege" :key="person.id">
                                                    <div @mousedown.prevent="addFormPerson(person)"
                                                         style="display:flex; align-items:center; justify-content:space-between;
                                                                padding:0.45rem 0.75rem; cursor:pointer; font-size:0.9rem;"
                                                         @mouseover="$el.style.background='var(--pico-secondary-background, #f0f0f0)'"
                                                         @mouseout="$el.style.background=''">
                                                        <span x-text="person.nachname + (person.vorname ? ', ' + person.vorname : '')
                                                                       + (person.geburtsdatum ? ' *' + person.geburtsdatum.substring(0,4) : '')"></span>
                                                        <span style="color:var(--pico-primary); font-size:1rem; font-weight:bold; margin-left:0.5rem;">+</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- Quelle -->
                                    <label>
                                        Quelle
                                        <input type="text" x-model="form.quelle"
                                               placeholder="Automatisch aus URL-Domain">
                                    </label>

                                    <!-- Beschreibung -->
                                    <label>
                                        Beschreibung
                                        <textarea x-model="form.beschreibung_kurz" rows="2"></textarea>
                                    </label>

                                    <template x-if="formError">
                                        <p style="color:var(--pico-del-color);" x-text="formError"></p>
                                    </template>
                                </form>
                                <footer>
                                    <button class="secondary outline" @click="modalOpen = false">Abbrechen</button>
                                    <button @click="save()" :disabled="saving">
                                        <span x-show="!saving">Speichern</span>
                                        <span x-show="saving">Speichert…</span>
                                    </button>
                                </footer>
                            </article>
                        </dialog>

                        <!-- Löschen-Bestätigung -->
                        <dialog :open="deleteConfirmOpen" x-show="deleteConfirmOpen">
                            <article>
                                <header>
                                    <button aria-label="Schließen" rel="prev" @click="deleteConfirmOpen = false"></button>
                                    <h3>Dokument löschen?</h3>
                                </header>
                                <p>Das Dokument und alle Personenverknüpfungen werden unwiderruflich gelöscht.</p>
                                <footer>
                                    <button class="secondary outline" @click="deleteConfirmOpen = false">Abbrechen</button>
                                    <button class="contrast" @click="doDelete()" :disabled="deleting">
                                        <span x-show="!deleting">Löschen</span>
                                        <span x-show="deleting">Löscht…</span>
                                    </button>
                                </footer>
                            </article>
                        </dialog>

                    </div>
                </template>

                <!-- Suche (Platzhalter) -->
                <template x-if="router.is('suche')">
                    <div>
                        <div class="page-placeholder">
                            <h2>Suche</h2>
                            <p>Diese Seite wird in der nächsten Phase implementiert.</p>
                        </div>
                    </div>
                </template>

                <!-- Import-Wizard -->
                <template x-if="router.is('import')">
                    <div x-data="importPage">

                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem;">
                            <h2 style="margin:0;">Import</h2>
                            <button class="outline" style="font-size:0.85rem;" x-show="schritt > 1" @click="reset()">
                                Neu starten
                            </button>
                        </div>

                        <!-- Schrittanzeige -->
                        <div class="wizard-steps">
                            <div :class="['wizard-step', schritt >= 1 ? 'done' : '', schritt === 1 ? 'current' : '']">
                                <span class="wizard-step-num">1</span>
                                <span class="wizard-step-label">Datei</span>
                            </div>
                            <div class="wizard-connector"></div>
                            <div :class="['wizard-step', schritt >= 2 ? 'done' : '', schritt === 2 ? 'current' : '']">
                                <span class="wizard-step-num">2</span>
                                <span class="wizard-step-label">Spalten</span>
                            </div>
                            <div class="wizard-connector"></div>
                            <div :class="['wizard-step', schritt >= 3 ? 'done' : '', schritt === 3 ? 'current' : '']">
                                <span class="wizard-step-num">3</span>
                                <span class="wizard-step-label">Vorschau</span>
                            </div>
                            <div class="wizard-connector"></div>
                            <div :class="['wizard-step', schritt >= 4 ? 'done' : '', schritt === 4 ? 'current' : '']">
                                <span class="wizard-step-num">4</span>
                                <span class="wizard-step-label">Ergebnis</span>
                            </div>
                            <div class="wizard-connector"></div>
                            <div :class="['wizard-step', schritt >= 5 ? 'done' : '', schritt === 5 ? 'current' : '']">
                                <span class="wizard-step-num">5</span>
                                <span class="wizard-step-label">URL-Prüfung</span>
                            </div>
                        </div>

                        <!-- ================================================
                             SCHRITT 1: Datei-Upload
                             ================================================ -->
                        <template x-if="schritt === 1">
                            <article>
                                <h3>Datei auswählen</h3>
                                <p style="color:var(--pico-muted-color);">
                                    Unterstützte Formate: <code>.xlsx</code>, <code>.xls</code>, <code>.ods</code>, <code>.csv</code>
                                </p>
                                <label>
                                    Datei
                                    <input type="file" accept=".xlsx,.xls,.ods,.csv"
                                           @change="onFileChange($event)">
                                </label>
                                <template x-if="analyzeError">
                                    <p style="color:var(--pico-del-color);" x-text="analyzeError"></p>
                                </template>
                                <button @click="doAnalyze()"
                                        :disabled="!datei || analyzing"
                                        :aria-busy="analyzing"
                                        style="margin-top:0.5rem;">
                                    <span x-text="analyzing ? 'Analysiere …' : 'Weiter →'"></span>
                                </button>
                            </article>
                        </template>

                        <!-- ================================================
                             SCHRITT 2: Spalten-Mapping
                             ================================================ -->
                        <template x-if="schritt === 2">
                            <div>
                                <article style="margin-bottom:1rem;">
                                    <p style="margin:0; color:var(--pico-muted-color);">
                                        <strong x-text="dateiName"></strong> –
                                        <span x-text="analyse.zeilenanzahl"></span> Zeilen,
                                        <span x-text="analyse.spaltenanzahl"></span> Spalten
                                    </p>
                                    <div style="margin-top:0.75rem; max-width:220px;">
                                        <label for="import-startzeile" style="font-size:0.9rem;">Erste Datenzeile</label>
                                        <input id="import-startzeile" type="number"
                                               x-model.number="startzeile" min="1"
                                               style="margin:0; padding:0.3rem 0.5rem;">
                                    </div>
                                </article>

                                <!-- Spaltenvorschau (immer sichtbar) -->
                                <article style="margin-bottom:1rem; padding:0.75rem 1rem;">
                                    <p style="font-weight:600; margin:0 0 0.5rem 0; font-size:0.9rem;">Spaltenvorschau</p>
                                    <div style="overflow-x:auto;">
                                        <table style="font-size:0.8rem; white-space:nowrap;">
                                            <thead>
                                                <tr>
                                                    <th style="color:var(--pico-muted-color);">#</th>
                                                    <template x-for="col in vorschauSpalten" :key="col">
                                                        <th x-text="col"></th>
                                                    </template>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="row in analyse.vorschau" :key="row.zeile">
                                                    <tr>
                                                        <td x-text="row.zeile" style="color:var(--pico-muted-color); font-weight:600;"></td>
                                                        <template x-for="col in vorschauSpalten" :key="col">
                                                            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;"
                                                                x-text="row.spalten[col] || '–'"></td>
                                                        </template>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </article>

                                <!-- Feld-Gruppen -->
                                <template x-for="gruppe in feldGruppen" :key="gruppe.gruppe">
                                    <article style="margin-bottom:1rem;">
                                        <header style="padding:0.5rem 0; border-bottom:1px solid var(--pico-secondary-background);">
                                            <strong x-text="gruppe.gruppe"></strong>
                                        </header>
                                        <div class="mapping-grid" style="margin-top:0.75rem;">
                                            <template x-for="feld in gruppe.felder" :key="feld">
                                                <div class="mapping-row">
                                                    <label :for="'map-' + feld" x-text="feldLabel(feld)"></label>
                                                    <select :id="'map-' + feld"
                                                            :value="mapping[feld] || ''"
                                                            @change="mapping[feld] = $event.target.value || undefined">
                                                        <option value="">– nicht zuordnen –</option>
                                                        <template x-for="opt in spaltenOptionen" :key="opt.col">
                                                            <option :value="opt.col"
                                                                    :selected="mapping[feld] === opt.col"
                                                                    x-text="opt.label"></option>
                                                        </template>
                                                    </select>
                                                </div>
                                            </template>
                                        </div>
                                        <!-- Biografisches Dokument – globale Einstellung (nur in der Dokument-Gruppe) -->
                                        <template x-if="gruppe.gruppe === 'Dokument'">
                                            <div style="margin-top:1rem; padding-top:0.75rem; border-top:1px solid var(--pico-secondary-background);">
                                                <p style="font-weight:600; margin:0 0 0.25rem 0; font-size:0.85rem;">Biografisches Dokument</p>
                                                <p style="margin:0 0 0.5rem 0; color:var(--pico-muted-color); font-size:0.82rem;">
                                                    Legt fest, ob das Dokument als Biografie der Person verknüpft wird.
                                                </p>
                                                <div style="display:flex; gap:1.5rem; flex-wrap:wrap;">
                                                    <label style="display:flex; align-items:center; gap:0.4rem; margin:0; font-size:0.875rem; cursor:pointer;">
                                                        <input type="radio" x-model="dokIstBiografieGlobal" value="spalte" style="margin:0;">
                                                        Aus Spalte lesen
                                                    </label>
                                                    <label style="display:flex; align-items:center; gap:0.4rem; margin:0; font-size:0.875rem; cursor:pointer;">
                                                        <input type="radio" x-model="dokIstBiografieGlobal" value="ja" style="margin:0;">
                                                        Alle: Ja (immer als Biografie)
                                                    </label>
                                                    <label style="display:flex; align-items:center; gap:0.4rem; margin:0; font-size:0.875rem; cursor:pointer;">
                                                        <input type="radio" x-model="dokIstBiografieGlobal" value="nein" style="margin:0;">
                                                        Alle: Nein (nie als Biografie)
                                                    </label>
                                                </div>
                                            </div>
                                        </template>
                                    </article>
                                </template>

                                <template x-if="previewError">
                                    <p style="color:var(--pico-del-color);" x-text="previewError"></p>
                                </template>
                                <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                                    <button class="outline" @click="schritt = 1">← Zurück</button>
                                    <button @click="doPreview()" :disabled="previewing" :aria-busy="previewing">
                                        <span x-text="previewing ? 'Prüfe …' : 'Vorschau anzeigen →'"></span>
                                    </button>
                                </div>
                            </div>
                        </template>

                        <!-- ================================================
                             SCHRITT 3: Vorschau (Dry-Run)
                             ================================================ -->
                        <template x-if="schritt === 3">
                            <div>
                                <!-- Zusammenfassung -->
                                <div class="stat-grid" style="margin-bottom:1.5rem;">
                                    <div class="stat-card">
                                        <div class="stat-value" x-text="vorschau.gesamt"></div>
                                        <div class="stat-label">Zeilen gesamt</div>
                                    </div>
                                    <div class="stat-card">
                                        <div class="stat-value" x-text="vorschau.neue_personen"></div>
                                        <div class="stat-label">Neue Personen</div>
                                    </div>
                                    <div class="stat-card">
                                        <div class="stat-value" x-text="vorschau.neue_verlegeorte"></div>
                                        <div class="stat-label">Neue Verlegeorte</div>
                                    </div>
                                    <div class="stat-card">
                                        <div class="stat-value" x-text="vorschau.neue_steine"></div>
                                        <div class="stat-label">Neue Stolpersteine</div>
                                    </div>
                                    <div class="stat-card" x-show="vorschau.fehler > 0">
                                        <div class="stat-value" style="color:var(--pico-del-color);" x-text="vorschau.fehler"></div>
                                        <div class="stat-label">Fehler</div>
                                    </div>
                                </div>

                                <!-- Zeilendetails -->
                                <details open>
                                    <summary style="cursor:pointer; font-weight:600; padding:0.5rem 0;">
                                        Zeilendetails (<span x-text="vorschau.zeilen.length"></span>)
                                    </summary>
                                    <div style="overflow-x:auto; margin-top:0.5rem;">
                                        <table style="font-size:0.8rem;">
                                            <thead>
                                                <tr>
                                                    <th>Zeile</th>
                                                    <th>Status</th>
                                                    <th>Person</th>
                                                    <th>Verlegeort</th>
                                                    <th>Hinweise</th>
                                                    <th>Daten</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="(zeile, idx) in vorschau.zeilen" :key="zeile.zeile">
                                                    <tr x-show="idx < vorschauLimit">
                                                        <td x-text="zeile.zeile" style="color:var(--pico-muted-color);"></td>
                                                        <td>
                                                            <span :style="'color:' + (zeile.status === 'ok' ? 'var(--pico-ins-color)' : 'var(--pico-del-color)')"
                                                                  x-text="zeile.status === 'ok' ? 'OK' : 'Fehler'"></span>
                                                        </td>
                                                        <td>
                                                            <template x-if="zeile.person">
                                                                <span>
                                                                    <span x-text="[zeile.person.vorname, zeile.person.nachname].filter(Boolean).join(' ')"></span>
                                                                    <span style="color:var(--pico-muted-color); font-size:0.75rem;"
                                                                          x-text="' (' + personStatusLabel(zeile.person_status) + ')'"></span>
                                                                </span>
                                                            </template>
                                                        </td>
                                                        <td>
                                                            <template x-if="zeile.verlegeort">
                                                                <span>
                                                                    <span x-text="[zeile.verlegeort.strasse_aktuell, zeile.verlegeort.hausnummer_aktuell].filter(Boolean).join(' ')"></span>
                                                                    <span style="color:var(--pico-muted-color); font-size:0.75rem;"
                                                                          x-text="' (' + ortStatusLabel(zeile.ort_status) + ')'"></span>
                                                                </span>
                                                            </template>
                                                        </td>
                                                        <td>
                                                            <template x-if="zeile.meldungen && zeile.meldungen.length">
                                                                <span x-text="zeile.meldungen.join(', ')"
                                                                      style="color:var(--pico-del-color);"></span>
                                                            </template>
                                                        </td>
                                                        <td>
                                                            <template x-if="zeile.status === 'ok'">
                                                                <details>
                                                                    <summary style="cursor:pointer; font-size:0.78rem; color:var(--pico-muted-color); white-space:nowrap;">
                                                                        alle Felder
                                                                    </summary>
                                                                    <div style="margin-top:0.4rem; min-width:280px; max-width:420px;">
                                                                        <template x-for="f in alleFelder(zeile)" :key="f.feld">
                                                                            <div style="display:flex; gap:0.4rem; padding:0.15rem 0; border-bottom:1px solid var(--pico-table-border-color); font-size:0.78rem;">
                                                                                <span style="color:var(--pico-muted-color); flex-shrink:0; min-width:130px;" x-text="f.feld"></span>
                                                                                <span x-text="f.wert" style="word-break:break-word;"></span>
                                                                            </div>
                                                                        </template>
                                                                    </div>
                                                                </details>
                                                            </template>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                        <template x-if="vorschau.zeilen.length > vorschauLimit">
                                            <p style="text-align:center; color:var(--pico-muted-color); font-size:0.85rem; margin-top:0.5rem;">
                                                … und <span x-text="vorschau.zeilen.length - vorschauLimit"></span> weitere Zeilen –
                                                <a href="#" @click.prevent="vorschauLimit += 100">Mehr anzeigen</a>
                                            </p>
                                        </template>
                                    </div>
                                </details>

                                <template x-if="executeError">
                                    <p style="color:var(--pico-del-color); margin-top:1rem;" x-text="executeError"></p>
                                </template>
                                <div style="display:flex; gap:0.5rem; margin-top:1rem; align-items:center; flex-wrap:wrap;">
                                    <button class="outline" @click="schritt = 2">← Zurück</button>
                                    <template x-if="!importMoeglich">
                                        <p style="margin:0; color:var(--pico-del-color);">
                                            Alle Zeilen haben Fehler – Import nicht möglich.
                                        </p>
                                    </template>
                                    <template x-if="importMoeglich">
                                        <button @click="doExecute()" :disabled="executing" :aria-busy="executing"
                                                style="background:var(--pico-ins-color); border-color:var(--pico-ins-color);">
                                            <span x-text="executing ? 'Importiere …' : 'Import starten (' + vorschau.neue_steine + ' Stolpersteine)'"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- ================================================
                             SCHRITT 4: Ergebnis
                             ================================================ -->
                        <template x-if="schritt === 4">
                            <div>
                                <article style="border-left:4px solid var(--pico-ins-color); margin-bottom:1.5rem;">
                                    <h3 style="color:var(--pico-ins-color); margin-top:0;">✓ Import abgeschlossen</h3>
                                    <div class="stat-grid">
                                        <div class="stat-card">
                                            <div class="stat-value" x-text="ergebnis.neue_personen"></div>
                                            <div class="stat-label">Neue Personen</div>
                                        </div>
                                        <div class="stat-card">
                                            <div class="stat-value" x-text="ergebnis.neue_verlegeorte"></div>
                                            <div class="stat-label">Neue Verlegeorte</div>
                                        </div>
                                        <div class="stat-card">
                                            <div class="stat-value" x-text="ergebnis.neue_steine"></div>
                                            <div class="stat-label">Importierte Stolpersteine</div>
                                        </div>
                                        <div class="stat-card" x-show="ergebnis.fehler > 0">
                                            <div class="stat-value" style="color:var(--pico-del-color);" x-text="ergebnis.fehler"></div>
                                            <div class="stat-label">Übersprungene Zeilen</div>
                                        </div>
                                    </div>
                                    <div style="display:flex; gap:0.5rem; margin-top:1rem; flex-wrap:wrap;">
                                        <button class="outline" @click="reset()">Neuer Import</button>
                                        <a href="#stolpersteine" role="button" class="outline">Stolpersteine ansehen</a>
                                        <template x-if="hatDokumentUrls">
                                            <button @click="schritt = 5"
                                                    style="background:var(--pico-primary); border-color:var(--pico-primary);">
                                                URLs prüfen (<span x-text="ergebnis.dokumente.length"></span>) →
                                            </button>
                                        </template>
                                    </div>
                                </article>

                                <!-- Importdetails (aufklappbar) -->
                                <details>
                                    <summary style="cursor:pointer; font-weight:600; padding:0.5rem 0;">
                                        Importdetails (<span x-text="ergebnis.zeilen.length"></span> Zeilen)
                                    </summary>
                                    <div style="overflow-x:auto; margin-top:0.5rem;">
                                        <table style="font-size:0.8rem;">
                                            <thead>
                                                <tr>
                                                    <th>Zeile</th>
                                                    <th>Status</th>
                                                    <th>Person-ID</th>
                                                    <th>Verlegeort-ID</th>
                                                    <th>Stolperstein-ID</th>
                                                    <th>Hinweise</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="zeile in ergebnis.zeilen" :key="zeile.zeile">
                                                    <tr>
                                                        <td x-text="zeile.zeile" style="color:var(--pico-muted-color);"></td>
                                                        <td>
                                                            <span :style="'color:' + (zeile.status === 'importiert' ? 'var(--pico-ins-color)' : 'var(--pico-del-color)')"
                                                                  x-text="zeile.status"></span>
                                                        </td>
                                                        <td x-text="zeile.person_id ?? '–'"></td>
                                                        <td x-text="zeile.verlegeort_id ?? '–'"></td>
                                                        <td x-text="zeile.stolperstein_id ?? '–'"></td>
                                                        <td>
                                                            <template x-if="zeile.meldungen && zeile.meldungen.length">
                                                                <span x-text="zeile.meldungen.join(', ')"
                                                                      style="color:var(--pico-del-color);"></span>
                                                            </template>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </details>
                            </div>
                        </template>

                        <!-- ================================================
                             SCHRITT 5: URL-Prüfung
                             ================================================ -->
                        <template x-if="schritt === 5">
                            <div>
                                <article style="margin-bottom:1.5rem;">
                                    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; margin-bottom:1rem;">
                                        <div>
                                            <h3 style="margin:0 0 0.25rem 0;">URL-Prüfung</h3>
                                            <p style="margin:0; color:var(--pico-muted-color); font-size:0.875rem;">
                                                HTTP-Status aller importierten Dokument-URLs prüfen.
                                            </p>
                                        </div>
                                        <button @click="doUrlValidierung()"
                                                :disabled="urlPruefend"
                                                :aria-busy="urlPruefend"
                                                style="margin:0;">
                                            <span x-text="urlPruefend ? 'Prüfe …' : 'Alle URLs prüfen'"></span>
                                        </button>
                                    </div>

                                    <div style="overflow-x:auto;">
                                        <table style="font-size:0.85rem;">
                                            <thead>
                                                <tr>
                                                    <th>Titel</th>
                                                    <th>Typ</th>
                                                    <th>Größe</th>
                                                    <th>Quelle</th>
                                                    <th>URL</th>
                                                    <th>HTTP-Status</th>
                                                    <th>Geprüft am</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="dok in urlValidierung" :key="dok.id">
                                                    <tr>
                                                        <td x-text="dok.titel || '–'" style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></td>
                                                        <td><span x-text="(dok.typ ?? '–').toUpperCase()" style="font-size:0.75rem;"></span></td>
                                                        <td x-text="formatGroesse(dok.groesse_bytes)" style="white-space:nowrap;"></td>
                                                        <td x-text="dok.quelle || '–'" style="font-size:0.8rem; color:var(--pico-muted-color);"></td>
                                                        <td style="max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                                            <a :href="dok.quelle_url" target="_blank" rel="noopener"
                                                               x-text="dok.quelle_url" style="font-size:0.8rem;"></a>
                                                        </td>
                                                        <td>
                                                            <span :style="'font-weight:600; color:' + urlStatusFarbe(dok.url_status)"
                                                                  x-text="urlStatusLabel(dok.url_status)"></span>
                                                        </td>
                                                        <td x-text="dok.url_geprueft_am ? dok.url_geprueft_am.slice(0,16).replace('T',' ') : '–'"
                                                            style="font-size:0.8rem; color:var(--pico-muted-color); white-space:nowrap;"></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </article>

                                <div style="display:flex; gap:0.5rem;">
                                    <button class="outline" @click="schritt = 4">← Zurück</button>
