<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stolpersteine Verwaltung</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<!-- =====================================================================
     SCRIPTS: config → api → Seiten → app → Alpine (immer zuletzt)
     ===================================================================== -->
<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/login.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/personen.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/pages/stolpersteine.js"></script>
<script src="js/pages/verlegeorte.js"></script>
<script src="js/pages/import.js"></script>
<script src="js/pages/adressen.js"></script>
<script src="https://cdn.jsdelivr.net/npm/diff@5/dist/diff.min.js"></script>
<script src="js/pages/export.js"></script>
<script src="js/pages/dokumente.js"></script>
<script src="js/pages/benutzerverwaltung.js"></script>
<script src="js/pages/profil.js"></script>
<script src="js/app.js"></script>

<!-- =====================================================================
     APP-ROOT
     ===================================================================== -->
<div x-data="app">

    <!-- Initialisierung läuft noch -->
    <template x-if="!auth.ready">
        <div class="login-wrapper">
            <p aria-busy="true">Wird geladen …</p>
        </div>
    </template>

    <!-- ----------------------------------------------------------------
         LOGIN-SEITE
         ---------------------------------------------------------------- -->
    <template x-if="auth.ready && !auth.user">
        <div class="login-wrapper" x-data="loginPage" x-init="init()">
            <article class="login-card">
                <h1>Stolpersteine</h1>
                <p class="subtitle">Verwaltungssystem Magdeburg</p>

                <!-- ---- Anmelden ---------------------------------------- -->
                <div x-show="view === 'login'">
                    <form @submit.prevent="submit">
                        <label>
                            Benutzername
                            <input
                                type="text"
                                name="benutzername"
                                autocomplete="username"
                                x-model="benutzername"
                                :disabled="loading"
                                required
                                autofocus
                            >
                        </label>

                        <label>
                            Passwort
                            <input
                                type="password"
                                name="passwort"
                                autocomplete="current-password"
                                x-model="passwort"
                                :disabled="loading"
                                required
                            >
                        </label>

                        <p x-show="error" style="color: var(--pico-del-color); margin-bottom:0.5rem;" x-text="error"></p>

                        <button type="submit" :aria-busy="loading" :disabled="loading">
                            Anmelden
                        </button>
                    </form>
                    <p style="text-align:center; margin-top:0.75rem; font-size:0.875rem;">
                        <a href="#" @click.prevent="showForgot()" style="color: var(--pico-muted-color);">
                            Passwort vergessen?
                        </a>
                    </p>
                </div>

                <!-- ---- Passwort vergessen -------------------------------- -->
                <div x-show="view === 'forgotPassword'">
                    <h2 style="font-size:1.1rem; margin-bottom:1rem;">Passwort zurücksetzen</h2>
                    <p style="font-size:0.9rem; color:var(--pico-muted-color); margin-bottom:1rem;">
                        Gib deinen Benutzernamen oder deine E-Mail-Adresse ein.
                        Falls ein Konto gefunden wird, erhältst du eine E-Mail mit einem Link zum Zurücksetzen.
                    </p>
                    <form @submit.prevent="submitForgot()">
                        <label>
                            Benutzername oder E-Mail
                            <input
                                type="text"
                                x-model="forgotInput"
                                :disabled="forgotLoading"
                                required
                                autofocus
                            >
                        </label>
                        <button type="submit" :aria-busy="forgotLoading" :disabled="forgotLoading">
                            Zurücksetzen anfordern
                        </button>
                    </form>
                    <p style="text-align:center; margin-top:0.75rem; font-size:0.875rem;">
                        <a href="#" @click.prevent="backToLogin()" style="color: var(--pico-muted-color);">
                            Zurück zur Anmeldung
                        </a>
                    </p>
                </div>

                <!-- ---- Vergessen: Bestätigung ---------------------------- -->
                <div x-show="view === 'forgotSent'" style="text-align:center;">
                    <p style="margin-bottom:1rem;">
                        Falls die eingegebene Adresse in unserem System vorhanden ist,
                        wurde eine E-Mail mit einem Reset-Link versandt.
                        Bitte prüfe auch deinen Spam-Ordner.
                    </p>
                    <a href="#" @click.prevent="backToLogin()" role="button" class="outline" style="width:100%;">
                        Zurück zur Anmeldung
                    </a>
                </div>

                <!-- ---- Passwort neu vergeben ----------------------------- -->
                <div x-show="view === 'resetPassword'">
                    <h2 style="font-size:1.1rem; margin-bottom:1rem;">Neues Passwort vergeben</h2>
                    <form @submit.prevent="submitReset()">
                        <label>
                            Neues Passwort
                            <input
                                type="password"
                                autocomplete="new-password"
                                x-model="neuesPasswort"
                                :disabled="resetLoading"
                                required
                                autofocus
                                minlength="8"
                            >
                        </label>
                        <label>
                            Passwort bestätigen
                            <input
                                type="password"
                                autocomplete="new-password"
                                x-model="neuesPasswort2"
                                :disabled="resetLoading"
                                required
                                minlength="8"
                            >
                        </label>
                        <p x-show="neuesPasswort && neuesPasswort.length < 8"
                           style="color: var(--pico-del-color); font-size:0.875rem; margin-bottom:0.5rem;">
                            Das Passwort muss mindestens 8 Zeichen lang sein.
                        </p>
                        <p x-show="neuesPasswort2 && !resetPasswordsMatch"
                           style="color: var(--pico-del-color); font-size:0.875rem; margin-bottom:0.5rem;">
                            Die Passwörter stimmen nicht überein.
                        </p>
                        <p x-show="resetError"
                           style="color: var(--pico-del-color); font-size:0.875rem; margin-bottom:0.5rem;"
                           x-text="resetError"></p>
                        <button type="submit"
                                :aria-busy="resetLoading"
                                :disabled="resetLoading || !resetPasswordsMatch || neuesPasswort.length < 8">
                            Passwort speichern
                        </button>
                    </form>
                </div>

                <!-- ---- Reset erfolgreich --------------------------------- -->
                <div x-show="view === 'resetDone'" style="text-align:center;">
                    <p style="margin-bottom:1rem;">
                        Dein Passwort wurde erfolgreich geändert.
                        Du kannst dich jetzt anmelden.
                    </p>
                    <a href="#" @click.prevent="backToLogin()" role="button" style="width:100%;">
                        Zur Anmeldung
                    </a>
                </div>

            </article>
        </div>
    </template>

    <!-- ----------------------------------------------------------------
         HAUPT-APP (eingeloggt)
         ---------------------------------------------------------------- -->
    <template x-if="auth.ready && auth.user">
        <div>

            <!-- Navigation -->
            <header class="container-fluid">
                <nav>
                    <a class="nav-brand" href="#dashboard"
                       x-text="config.stadt_name ? 'Stolpersteine (' + config.stadt_name + ')' : 'Stolpersteine'">
                    </a>

                    <ul class="nav-links">
                        <li>
                            <a href="#dashboard"
                               :class="{ active: router.is('dashboard') }">
                                Dashboard
                            </a>
                        </li>
                        <li>
                            <a href="#personen"
                               :class="{ active: router.is('personen') }">
                                Personen
                            </a>
                        </li>
                        <li>
                            <a href="#stolpersteine"
                               :class="{ active: router.is('stolpersteine') }">
                                Stolpersteine
                            </a>
                        </li>
                        <li>
                            <a href="#verlegeorte"
                               :class="{ active: router.is('verlegeorte') }">
                                Verlegeorte
                            </a>
                        </li>
                        <li>
                            <a href="#dokumente"
                               :class="{ active: router.is('dokumente') }">
                                Dokumente
                            </a>
                        </li>
                        <li>
                            <a href="#import"
                               :class="{ active: router.is('import') }">
                                Import
                            </a>
                        </li>
                        <li x-show="auth.isAdmin">
                            <a href="#export"
                               :class="{ active: router.is('export') }">
                                Export
                            </a>
                        </li>
                        <li x-show="auth.isAdmin">
                            <a href="#adressen"
                               :class="{ active: router.is('adressen') }">
                                Adressen
                            </a>
                        </li>
                        <li x-show="auth.isAdmin">
                            <a href="#benutzerverwaltung"
                               :class="{ active: router.is('benutzerverwaltung') }">
                                Benutzer
                            </a>
                        </li>
                    </ul>

                    <ul style="list-style:none; margin:0; padding:0;">
                        <li style="display:flex; align-items:center; gap:0.5rem;">
                            <a href="#profil"
                               :class="{ active: router.is('profil') }"
                               style="font-size:0.9rem;"
                               x-text="auth.user.benutzername">
                            </a>
                            <a href="#" role="button" class="outline" style="font-size:0.85rem; padding: 0.3rem 0.7rem;"
                               @click.prevent="auth.logout()">
                                Abmelden
                            </a>
                        </li>
                    </ul>
                </nav>
            </header>

            <!-- Seiteninhalt -->
            <main class="container">

                <!-- Dashboard -->
                <template x-if="router.is('dashboard')">
                    <div x-data="dashboardPage" x-init="init()">
                        <h2>Dashboard</h2>

                        <div x-show="loading" class="loading-spinner">
                            <span aria-busy="true"></span> Lade Statistiken …
                        </div>

                        <template x-if="!loading && stats">
                            <div>
                                <div class="stat-grid">
                                    <a href="#personen" class="stat-card">
                                        <div class="stat-value" x-text="stats.personen"></div>
                                        <div class="stat-label">Personen</div>
                                    </a>
                                    <a href="#stolpersteine" class="stat-card">
                                        <div class="stat-value" x-text="stats.steine"></div>
                                        <div class="stat-label">Stolpersteine</div>
                                    </a>
                                    <a href="#verlegeorte" class="stat-card">
                                        <div class="stat-value" x-text="stats.orte"></div>
                                        <div class="stat-label">Verlegeorte</div>
                                    </a>
                                    <a href="#dokumente" class="stat-card">
                                        <div class="stat-value" x-text="stats.dokumente"></div>
                                        <div class="stat-label">Dokumente</div>
                                    </a>
                                </div>
                                <div class="stat-grid" style="margin-top:1rem;">
                                    <a href="#adressen/staedte" class="stat-card">
                                        <div class="stat-value" x-text="stats.staedte"></div>
                                        <div class="stat-label">Städte</div>
                                    </a>
                                    <a href="#adressen/stadtteile" class="stat-card">
                                        <div class="stat-value" x-text="stats.stadtteile"></div>
                                        <div class="stat-label">Stadtteile</div>
                                    </a>
                                    <a href="#adressen/strassen" class="stat-card">
                                        <div class="stat-value" x-text="stats.strassen"></div>
                                        <div class="stat-label">Straßen</div>
                                    </a>
                                    <a href="#adressen/lokationen" class="stat-card">
                                        <div class="stat-value" x-text="stats.lokationen"></div>
                                        <div class="stat-label">Lokationen</div>
                                    </a>
                                    <a href="#adressen/plz" class="stat-card">
                                        <div class="stat-value" x-text="stats.plz"></div>
                                        <div class="stat-label">PLZ</div>
                                    </a>
                                </div>
                            </div>
                        </template>

                        <template x-if="!loading && error">
                            <p style="color: var(--pico-del-color);" x-text="error"></p>
                        </template>

                        <p style="color: var(--pico-muted-color); font-size: 0.9rem;">
                            Angemeldet als
                            <strong x-text="auth.user.benutzername"></strong>
                            (<span x-text="auth.user.rolle"></span>)
                        </p>
                    </div>
                </template>

                <!-- Personen -->
                <template x-if="router.is('personen')">
                    <div x-data="personenPage" x-init="init()">

                        <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; margin-bottom:1rem;">
                            <h2 style="margin:0;">Personen</h2>
                            <button @click="openCreate()">+ Neue Person</button>
                        </div>

                        <!-- Filter (Live-Suche) -->
                        <div class="filter-bar">
                            <label class="filter-field">
                                <span>Name</span>
                                <input type="text" x-model="filter.name"
                                       @input.debounce.300ms="load()"
                                       placeholder="Vor-, Nach- oder Geburtsname …">
                            </label>
                            <label class="filter-field">
                                <span>Status</span>
                                <select x-model="filter.status" @change="load()">
                                    <option value="">Alle</option>
                                    <option value="validierung">Validierung</option>
                                    <option value="ok">Ok</option>
                                </select>
                            </label>
                            <button type="button" class="outline" @click="resetFilter()"
                                    style="align-self:flex-end;">
                                Zurücksetzen
                            </button>
                        </div>

                        <!-- Fehlermeldung -->
                        <template x-if="error">
                            <p style="color:var(--pico-del-color);" x-text="error"></p>
                        </template>

                        <!-- Ladeindikator -->
                        <div x-show="loading" class="loading-spinner">
                            <span aria-busy="true"></span> Lade …
                        </div>

                        <!-- Tabelle -->
                        <template x-if="!loading">
                            <div>
                                <template x-if="personen.length === 0">
                                    <p style="color:var(--pico-muted-color);">Keine Personen gefunden.</p>
                                </template>
                                <template x-if="personen.length > 0">
                                    <figure style="overflow-x:auto;">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>Nachname</th>
                                                    <th>Vorname</th>
                                                    <th>Geburtsname</th>
                                                    <th>Geboren</th>
                                                    <th>Gestorben</th>
                                                    <th>Status</th>
                                                    <th style="width:1%;">Aktionen</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="p in personen" :key="p.id">
                                                    <tr class="tr-clickable" @click="openEdit(p)">
                                                        <td x-text="p.nachname"></td>
                                                        <td x-text="p.vorname || '–'"></td>
                                                        <td x-text="p.geburtsname || '–'"></td>
                                                        <td x-text="formatDate(p.geburtsdatum, p.geburtsdatum_genauigkeit)"></td>
                                                        <td x-text="formatDate(p.sterbedatum, p.sterbedatum_genauigkeit)"></td>
                                                        <td>
                                                            <span class="badge" :class="'badge-status-' + p.status"
                                                                  x-text="statusLabel(p.status)"></span>
                                                        </td>
                                                        <td style="white-space:nowrap; text-align:right;">
                                                            <button class="btn-icon btn-wikidata" x-show="p.wikidata_id_person"
                                                                    @click.stop="window.open('https://www.wikidata.org/wiki/' + p.wikidata_id_person, '_blank')"
                                                                    title="Wikidata-Seite öffnen" aria-label="Wikidata öffnen">
                                                                <span x-html="ICONS.wikidata"></span>
                                                            </button>
                                                            <button class="btn-icon btn-outlined" @click.stop="openEdit(p)" title="Bearbeiten" aria-label="Bearbeiten">✎
                                                            </button>
                                                            <button class="btn-icon btn-outlined btn-delete" x-show="auth.isAdmin" @click.stop="openDelete(p)" title="Löschen" aria-label="Löschen">✕
                                                            </button>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </figure>
                                </template>
                            </div>
                        </template>

                        <!-- Modal: Anlegen / Bearbeiten -->
                        <dialog :open="modalOpen" @keydown.escape.window="if(modalOpen) closeModal()">
                            <article>
                                <header>
                                    <h3 x-text="modalMode === 'create' ? 'Neue Person' : 'Person bearbeiten'"></h3>
                                </header>

                                <form @submit.prevent="save()">
                                    <div class="grid">
                                        <label>
                                            Nachname *
                                            <input id="p-nachname" type="text" x-model="form.nachname" required :disabled="saving">
                                        </label>
                                        <label>
                                            Vorname
                                            <input type="text" x-model="form.vorname" :disabled="saving">
                                        </label>
                                    </div>
                                    <div class="grid">
                                        <label>
                                            Geburtsname
                                            <input type="text" x-model="form.geburtsname" :disabled="saving">
                                        </label>
                                        <label>
                                            Wikipedia-Artikelname
                                            <input type="text" x-model="form.wikipedia_name" placeholder="z. B. Max Mustermann (Magdeburg)" :disabled="saving">
                                        </label>
                                    </div>
                                    <div>
                                        <span style="font-size:0.875rem;">Wikidata-ID</span>
                                        <div style="display:flex; gap:0.4rem; align-items:center; margin-top:0.35rem;">
                                            <input type="text" x-model="form.wikidata_id_person" placeholder="Q12345" :disabled="saving" style="margin:0; flex:1;">
                                            <button type="button" class="btn-icon btn-wikidata"
                                                    :disabled="!form.wikidata_id_person"
                                                    @click="window.open('https://www.wikidata.org/wiki/' + form.wikidata_id_person, '_blank')"
                                                    title="Wikidata-Seite öffnen" aria-label="Wikidata öffnen">
                                                <span x-html="ICONS.wikidata"></span>
                                            </button>
                                        </div>
                                    </div>
                                    <!-- Geburtsdatum -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Geburtsdatum</legend>
                                        <div class="grid" style="align-items:end;">
                                            <label style="margin:0;">
                                                Genauigkeit
                                                <select x-model="form.geburtsdatum_genauigkeit" :disabled="saving">
                                                    <option value="">Unbekannt</option>
                                                    <option value="tag">Genaues Datum</option>
                                                    <option value="monat">Nur Monat + Jahr</option>
                                                    <option value="jahr">Nur Jahr</option>
                                                </select>
                                            </label>
                                            <template x-if="!form.geburtsdatum_genauigkeit || form.geburtsdatum_genauigkeit === 'tag'">
                                                <label style="margin:0;">
                                                    Datum
                                                    <input type="date" x-model="form.geburtsdatum_voll" :disabled="saving">
                                                </label>
                                            </template>
                                            <template x-if="form.geburtsdatum_genauigkeit === 'monat'">
                                                <div class="grid" style="margin:0;">
                                                    <label style="margin:0;">
                                                        Jahr
                                                        <input type="number" x-model="form.geburtsdatum_jahr" placeholder="1900" min="1" max="2100" :disabled="saving">
                                                    </label>
                                                    <label style="margin:0;">
                                                        Monat
                                                        <select x-model="form.geburtsdatum_monat" :disabled="saving">
                                                            <option value="01">Januar</option><option value="02">Februar</option>
                                                            <option value="03">März</option><option value="04">April</option>
                                                            <option value="05">Mai</option><option value="06">Juni</option>
                                                            <option value="07">Juli</option><option value="08">August</option>
                                                            <option value="09">September</option><option value="10">Oktober</option>
                                                            <option value="11">November</option><option value="12">Dezember</option>
                                                        </select>
                                                    </label>
                                                </div>
                                            </template>
                                            <template x-if="form.geburtsdatum_genauigkeit === 'jahr'">
                                                <label style="margin:0;">
                                                    Jahr
                                                    <input type="number" x-model="form.geburtsdatum_jahr" placeholder="1900" min="1" max="2100" :disabled="saving">
                                                </label>
                                            </template>
                                        </div>
                                    </fieldset>

                                    <!-- Sterbedatum -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Sterbedatum</legend>
                                        <div class="grid" style="align-items:end;">
                                            <label style="margin:0;">
                                                Genauigkeit
                                                <select x-model="form.sterbedatum_genauigkeit" :disabled="saving">
                                                    <option value="">Unbekannt</option>
                                                    <option value="tag">Genaues Datum</option>
                                                    <option value="monat">Nur Monat + Jahr</option>
                                                    <option value="jahr">Nur Jahr</option>
                                                </select>
                                            </label>
                                            <template x-if="!form.sterbedatum_genauigkeit || form.sterbedatum_genauigkeit === 'tag'">
                                                <label style="margin:0;">
                                                    Datum
                                                    <input type="date" x-model="form.sterbedatum_voll" :disabled="saving">
                                                </label>
                                            </template>
                                            <template x-if="form.sterbedatum_genauigkeit === 'monat'">
                                                <div class="grid" style="margin:0;">
                                                    <label style="margin:0;">
                                                        Jahr
                                                        <input type="number" x-model="form.sterbedatum_jahr" placeholder="1900" min="1" max="2100" :disabled="saving">
                                                    </label>
                                                    <label style="margin:0;">
                                                        Monat
                                                        <select x-model="form.sterbedatum_monat" :disabled="saving">
                                                            <option value="01">Januar</option><option value="02">Februar</option>
                                                            <option value="03">März</option><option value="04">April</option>
                                                            <option value="05">Mai</option><option value="06">Juni</option>
                                                            <option value="07">Juli</option><option value="08">August</option>
                                                            <option value="09">September</option><option value="10">Oktober</option>
                                                            <option value="11">November</option><option value="12">Dezember</option>
                                                        </select>
                                                    </label>
                                                </div>
                                            </template>
                                            <template x-if="form.sterbedatum_genauigkeit === 'jahr'">
                                                <label style="margin:0;">
                                                    Jahr
                                                    <input type="number" x-model="form.sterbedatum_jahr" placeholder="1900" min="1" max="2100" :disabled="saving">
                                                </label>
                                            </template>
                                        </div>
                                    </fieldset>
                                    <label>
                                        Kurzbiografie
                                        <textarea x-model="form.biografie_kurz" rows="4" :disabled="saving"></textarea>
                                    </label>
                                    <template x-if="form.biografie_dok_url">
                                        <p style="margin:0 0 0.75rem; font-size:0.875rem;">
                                            Biografie-Dokument:
                                            <a :href="form.biografie_dok_url" target="_blank" rel="noopener"
                                               x-text="form.biografie_dok_titel || form.biografie_dok_url"
                                               style="word-break:break-all;"></a>
                                        </p>
                                    </template>

                                    <label>
                                        Status
                                        <select x-model="form.status" :disabled="saving">
                                            <option value="validierung">Validierung</option>
                                            <option value="ok">Ok</option>
                                        </select>
                                    </label>

                                    <template x-if="formError">
                                        <p style="color:var(--pico-del-color);" x-text="formError"></p>
                                    </template>

                                    <footer style="display:flex; justify-content:flex-end; gap:0.5rem;">
                                        <button type="button" class="outline" @click="closeModal()" :disabled="saving">Abbrechen</button>
                                        <button type="submit" :aria-busy="saving" :disabled="saving">Speichern</button>
                                    </footer>
                                </form>
                            </article>
                        </dialog>

                        <!-- Modal: Löschen bestätigen -->
                        <dialog :open="deleteConfirmOpen" @keydown.escape.window="if(deleteConfirmOpen) closeDelete()">
                            <article>
                                <header><h3>Person löschen</h3></header>
                                <p>
                                    Soll <strong x-text="deletePersonName"></strong> wirklich gelöscht werden?<br>
                                    <small style="color:var(--pico-muted-color);">Verknüpfte Stolpersteine müssen vorher entfernt werden.</small>
                                </p>
                                <footer style="display:flex; justify-content:flex-end; gap:0.5rem;">
                                    <button class="outline" @click="closeDelete()" :disabled="deleting">Abbrechen</button>
                                    <button style="background:var(--pico-del-color); border-color:var(--pico-del-color);"
                                            @click="doDelete()" :aria-busy="deleting" :disabled="deleting">
                                        Löschen
                                    </button>
                                </footer>
                            </article>
                        </dialog>

                    </div>
                </template>

                <!-- Stolpersteine -->
                <template x-if="router.is('stolpersteine')">
                    <div x-data="stolpersteinePage" x-init="init()">

                        <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; margin-bottom:1rem;">
                            <h2 style="margin:0;">Stolpersteine</h2>
                            <button @click="openCreate()">+ Neuer Stolperstein</button>
                        </div>

                        <!-- Filter -->
                        <div class="filter-bar">
                            <!-- Namenssuche -->
                            <label class="filter-field">
                                <span>Person</span>
                                <input type="text"
                                       x-model="filter.name"
                                       @input.debounce.300ms="load()"
                                       placeholder="Name …"
                                       style="margin:0;">
                            </label>

                            <!-- Straßen-Lookup -->
                            <div class="filter-field">
                                <span>Straße</span>
                                <div class="lookup-wrapper">
                                    <input type="text"
                                           x-model="strasseLookup.query"
                                           @input.debounce.250ms="strasseFilterSuchen()"
                                           @focus="if(strasseLookup.ergebnisse.length) strasseLookup.offen = true"
                                           placeholder="Straße suchen …"
                                           style="margin:0;">
                                    <div class="lookup-dropdown" x-show="strasseLookup.offen" @click.outside="strasseLookup.offen = false">
                                        <template x-if="strasseLookup.loading">
                                            <div class="lookup-item lookup-loading">Suche …</div>
                                        </template>
                                        <template x-for="name in strasseLookup.ergebnisse" :key="name">
                                            <div class="lookup-item" @click="strasseFilterWaehlen(name)" x-text="name"></div>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <!-- Stadtteil-Lookup -->
                            <div class="filter-field">
                                <span>Stadtteil</span>
                                <div class="lookup-wrapper">
                                    <input type="text"
                                           x-model="stadtteilLookup.query"
                                           @input.debounce.250ms="stadtteilFilterSuchen()"
                                           @focus="if(stadtteilLookup.ergebnisse.length) stadtteilLookup.offen = true"
                                           placeholder="Stadtteil suchen …"
                                           style="margin:0;">
                                    <div class="lookup-dropdown" x-show="stadtteilLookup.offen" @click.outside="stadtteilLookup.offen = false">
                                        <template x-if="stadtteilLookup.loading">
                                            <div class="lookup-item lookup-loading">Suche …</div>
                                        </template>
                                        <template x-for="name in stadtteilLookup.ergebnisse" :key="name">
                                            <div class="lookup-item" @click="stadtteilFilterWaehlen(name)" x-text="name"></div>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <label class="filter-field">
                                <span>Status</span>
                                <select x-model="filter.status" @change="load()">
                                    <option value="">Alle</option>
                                    <option value="neu">Neu</option>
                                    <option value="validierung">In Validierung</option>
                                    <option value="freigegeben">Freigegeben</option>
                                    <option value="archiviert">Archiviert</option>
                                    <option value="fehlerhaft">Fehlerhaft</option>
                                </select>
                            </label>
                            <label class="filter-field">
                                <span>Zustand</span>
                                <select x-model="filter.zustand" @change="load()">
                                    <option value="">Alle</option>
                                    <option value="verfuegbar">Verfügbar</option>
                                    <option value="stein_fehlend">Stein fehlend</option>
                                    <option value="kein_stein">Kein Stein</option>
                                    <option value="beschaedigt">Beschädigt</option>
                                    <option value="unleserlich">Unleserlich</option>
                                </select>
                            </label>
                            <label class="filter-field">
                                <span>Foto</span>
                                <select x-model="filter.foto_status" @change="load()">
                                    <option value="">Alle</option>
                                    <option value="ohne_foto">Kein Foto</option>
                                    <option value="foto_ohne_commons">Foto, kein Commons-Link</option>
                                    <option value="ohne_commons">Kein Commons-Link</option>
                                </select>
                            </label>
                            <button type="button" class="outline" @click="resetFilter()"
                                    style="align-self:flex-end;">
                                Zurücksetzen
                            </button>
                        </div>

                        <!-- Fehler -->
                        <template x-if="error">
                            <p style="color:var(--pico-del-color);" x-text="error"></p>
                        </template>

                        <!-- Ladeindikator -->
                        <div x-show="loading" class="loading-spinner">
                            <span aria-busy="true"></span> Lade …
                        </div>

                        <!-- Tabelle -->
                        <template x-if="!loading">
                            <div>
                                <template x-if="steine.length === 0">
                                    <p style="color:var(--pico-muted-color);">Keine Stolpersteine gefunden.</p>
                                </template>
                                <template x-if="steine.length > 0">
                                    <figure style="overflow-x:auto;">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>Person</th>
                                                    <th>Adresse</th>
                                                    <th>Verlegedatum</th>
                                                    <th>Status</th>
                                                    <th>Zustand</th>
                                                    <th style="width:1%; text-align:center;" title="Fotos (lokal / Commons)">Foto</th>
                                                    <th style="width:1%;">Aktionen</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="stein in steine" :key="stein.id">
                                                    <tr class="tr-clickable" @click="openEdit(stein)">
                                                        <td>
                                                            <span x-text="personAnzeige(stein)"></span>
                                                            <button class="btn-icon btn-wikidata" x-show="stein.wikidata_id_stein"
                                                                    @click.stop="window.open('https://www.wikidata.org/wiki/' + stein.wikidata_id_stein, '_blank')"
                                                                    title="Wikidata Stolperstein" aria-label="Wikidata öffnen">
                                                                <span x-html="ICONS.wikidata"></span>
                                                            </button>
                                                        </td>
                                                        <td x-text="adresseAnzeige(stein)"></td>
                                                        <td x-text="stein.verlegedatum ? stein.verlegedatum.split('-').reverse().join('.') : '–'"></td>
                                                        <td>
                                                            <span class="badge" :class="'badge-status-' + stein.status"
                                                                  x-text="statusLabel(stein.status)"></span>
                                                        </td>
                                                        <td>
                                                            <span class="badge" :class="'badge-zustand-' + stein.zustand"
                                                                  x-text="zustandLabel(stein.zustand)"></span>
                                                        </td>
                                                        <!-- Foto-Status -->
                                                        <td style="text-align:center; white-space:nowrap;">
                                                            <span :style="stein.foto_pfad ? 'color:var(--pico-primary)' : 'color:var(--pico-muted-color); opacity:0.35'"
                                                                  :title="stein.foto_pfad ? 'Lokales Foto vorhanden' : 'Kein lokales Foto'"
                                                                  x-html="ICONS.foto"></span>
                                                            <span :style="stein.wikimedia_commons ? 'color:#006699' : 'color:var(--pico-muted-color); opacity:0.35'"
                                                                  :title="stein.wikimedia_commons ? 'Commons: ' + stein.wikimedia_commons : 'Kein Commons-Link'"
                                                                  style="margin-left:0.2rem;"
                                                                  x-html="ICONS.commons"></span>
                                                        </td>
                                                        <td style="white-space:nowrap; text-align:right;">
                                                            <button class="btn-icon btn-outlined" @click.stop="openEdit(stein)" title="Bearbeiten" aria-label="Bearbeiten">✎
                                                            </button>
                                                            <button class="btn-icon btn-outlined btn-delete" x-show="auth.isAdmin" @click.stop="openDelete(stein)" title="Löschen" aria-label="Löschen">✕
                                                            </button>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </figure>
                                </template>
                            </div>
                        </template>

                        <!-- Modal: Anlegen / Bearbeiten -->
                        <dialog :open="modalOpen" @keydown.escape.window="if(modalOpen) closeModal()">
                            <article>
                                <header>
                                    <h3 x-text="modalMode === 'create' ? 'Neuer Stolperstein' : 'Stolperstein bearbeiten'"></h3>
                                </header>

                                <form @submit.prevent="save()">

                                    <!-- Person -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Person *</legend>

                                        <template x-if="personDisplay">
                                            <div class="adresse-block">
                                                <span style="flex:1;">
                                                    <span x-text="[personDisplay.vorname, personDisplay.nachname].filter(Boolean).join(' ')"></span>
                                                </span>
                                                <button type="button" class="outline" style="padding:0.2rem 0.6rem; font-size:0.8rem;"
                                                        @click="personZuruecksetzen()" :disabled="saving">
                                                    Ändern
                                                </button>
                                            </div>
                                        </template>

                                        <template x-if="!personDisplay">
                                            <div class="lookup-wrapper">
                                                <input type="text" id="st-person-lookup"
                                                       x-model="personLookup.query"
                                                       @input.debounce.200ms="personSuchen()"
                                                       @focus="if(personLookup.ergebnisse.length) personLookup.offen = true"
                                                       placeholder="Person suchen …"
                                                       :disabled="saving"
                                                       style="margin:0;">
                                                <div class="lookup-dropdown" x-show="personLookup.offen" @click.outside="personLookup.offen = false">
                                                    <template x-if="personLookup.loading">
                                                        <div class="lookup-item lookup-loading">Suche …</div>
                                                    </template>
                                                    <template x-if="!personLookup.loading && personLookup.ergebnisse.length === 0">
                                                        <div class="lookup-item lookup-loading">Keine Ergebnisse</div>
                                                    </template>
                                                    <template x-for="p in personLookup.ergebnisse" :key="p.id">
                                                        <div class="lookup-item" @click="personWaehlen(p)" style="display:flex; justify-content:space-between; align-items:baseline; gap:0.5rem;">
                                                            <span x-text="[p.vorname, p.nachname].filter(Boolean).join(' ') + (p.geburtsname ? ' geb. ' + p.geburtsname : '')"></span>
                                                            <small x-text="formatDate(p.geburtsdatum, p.geburtsdatum_genauigkeit)"
                                                                   style="color:var(--pico-muted-color); white-space:nowrap; flex-shrink:0;"></small>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </fieldset>

                                    <!-- Verlegeort -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Verlegeort *</legend>

                                        <template x-if="verlegeortDisplay">
                                            <div class="adresse-block">
                                                <span style="display:flex; flex-wrap:wrap; align-items:center; gap:0.4rem; flex:1;">
                                                    <span x-text="[verlegeortDisplay.strasse, verlegeortDisplay.hausnummer].filter(Boolean).join(' ')"></span>
                                                    <template x-if="verlegeortDisplay.stadtteil || verlegeortDisplay.plz">
                                                        <span style="color:var(--pico-muted-color);">·</span>
                                                    </template>
                                                    <small x-text="[verlegeortDisplay.plz, verlegeortDisplay.stadtteil].filter(Boolean).join(' ')"
                                                           style="color:var(--pico-muted-color);"></small>
                                                </span>
                                                <button type="button" class="outline" style="padding:0.2rem 0.6rem; font-size:0.8rem;"
                                                        @click="verlegeortZuruecksetzen()" :disabled="saving">
                                                    Ändern
                                                </button>
                                            </div>
                                        </template>

                                        <template x-if="!verlegeortDisplay">
                                            <div class="lookup-wrapper">
                                                <input type="text" id="st-ort-lookup"
                                                       x-model="verlegeortLookup.query"
                                                       @input.debounce.200ms="verlegeortSuchen()"
                                                       @focus="if(verlegeortLookup.ergebnisse.length) verlegeortLookup.offen = true"
                                                       placeholder="Straße suchen …"
                                                       :disabled="saving"
                                                       style="margin:0;">
                                                <div class="lookup-dropdown" x-show="verlegeortLookup.offen" @click.outside="verlegeortLookup.offen = false">
                                                    <template x-if="verlegeortLookup.loading">
                                                        <div class="lookup-item lookup-loading">Suche …</div>
                                                    </template>
                                                    <template x-if="!verlegeortLookup.loading && verlegeortLookup.ergebnisse.length === 0">
                                                        <div class="lookup-item lookup-loading">Keine Ergebnisse</div>
                                                    </template>
                                                    <template x-for="ort in verlegeortLookup.ergebnisse" :key="ort.id">
                                                        <div class="lookup-item" @click="verlegeortWaehlen(ort)">
                                                            <span x-text="[ort.strasse_aktuell, ort.hausnummer_aktuell].filter(Boolean).join(' ')"></span>
                                                            <small style="color:var(--pico-muted-color);"
                                                                   x-text="[ort.plz_aktuell, ort.stadtteil, ort.beschreibung ? ort.beschreibung.substring(0,40) : ''].filter(Boolean).join(' · ')"></small>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </fieldset>

                                    <!-- Raster-Positionsauswahl -->
                                    <template x-if="verlegeortGrid.n && verlegeortGrid.m">
                                        <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                            <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">
                                                Position im Raster
                                                <template x-if="form.pos_x && form.pos_y">
                                                    <span style="color:var(--pico-primary); margin-left:0.4rem;"
                                                          x-text="'Sp. ' + form.pos_x + ' / Z. ' + form.pos_y"></span>
                                                </template>
                                            </legend>
                                            <div class="raster-picker"
                                                 :style="'grid-template-columns: repeat(' + verlegeortGrid.n + ', 2rem);'">
                                                <template x-for="zeile in Array.from({length: verlegeortGrid.m}, (_, i) => i + 1)" :key="'z' + zeile">
                                                    <template x-for="spalte in Array.from({length: verlegeortGrid.n}, (_, i) => i + 1)" :key="'s' + spalte">
                                                        <button type="button"
                                                                class="raster-zelle"
                                                                :class="{
                                                                    'raster-ausgewaehlt': form.pos_x == spalte && form.pos_y == zeile,
                                                                    'raster-belegt':      rasterPositionen.some(p => p.pos_x == spalte && p.pos_y == zeile)
                                                                }"
                                                                :title="rasterPositionen.find(p => p.pos_x == spalte && p.pos_y == zeile)?.name || (form.pos_x == spalte && form.pos_y == zeile ? 'Ausgewählt – klicken zum Aufheben' : 'Sp. ' + spalte + ' / Z. ' + zeile)"
                                                                @click="rasterZelleWaehlen(spalte, zeile)">
                                                        </button>
                                                    </template>
                                                </template>
                                            </div>
                                            <p style="font-size:0.75rem; color:var(--pico-muted-color); margin:0.4rem 0 0;">
                                                Klicken zum Wählen · Erneut klicken hebt Auswahl auf.
                                                <template x-if="rasterPositionen.length > 0">
                                                    <span> · <span style="display:inline-block; width:0.7rem; height:0.7rem; background:var(--pico-muted-color); border-radius:2px; vertical-align:middle;"></span> = belegt</span>
                                                </template>
                                            </p>
                                        </fieldset>
                                    </template>

                                    <!-- Koordinaten-Override -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">
                                            Koordinaten-Override
                                            <template x-if="form.lat_override && form.lon_override">
                                                <span style="color:var(--pico-primary); margin-left:0.4rem;">aktiv</span>
                                            </template>
                                        </legend>
                                        <p style="font-size:0.8rem; color:var(--pico-muted-color); margin:0 0 0.5rem;">Überschreibt die Koordinaten des Verlegeorts für diesen Stein.</p>
                                        <div class="grid" style="align-items:end;">
                                            <label style="margin:0;">
                                                Breitengrad (lat)
                                                <input type="number" x-model="form.lat_override" step="0.00000001"
                                                       placeholder="vom Verlegeort" :disabled="saving"
                                                       @change="updateSteinMapMarker()" style="margin:0;">
                                            </label>
                                            <label style="margin:0;">
                                                Längengrad (lon)
                                                <input type="number" x-model="form.lon_override" step="0.00000001"
                                                       placeholder="vom Verlegeort" :disabled="saving"
                                                       @change="updateSteinMapMarker()" style="margin:0;">
                                            </label>
                                            <div style="display:flex; align-items:flex-end; padding-bottom:0.1rem;">
                                                <button type="button" class="outline btn-delete"
                                                        :disabled="saving || (!form.lat_override && !form.lon_override)"
                                                        @click="steinOverrideLoeschen()"
                                                        style="margin:0; font-size:0.8rem; padding:0.3rem 0.6rem; width:100%;">
                                                    Override löschen
                                                </button>
                                            </div>
                                        </div>
                                        <div id="map-stein-edit" style="height:220px; margin-top:0.75rem; border-radius:var(--pico-border-radius); overflow:hidden;"></div>
                                        <p style="font-size:0.8rem; color:var(--pico-muted-color); margin:0.4rem 0 0;">Auf die Karte klicken oder Marker ziehen, um Koordinaten zu setzen.</p>
                                    </fieldset>

                                    <!-- Verlegedatum + Status + Zustand -->
                                    <div class="grid">
                                        <label style="margin:0;">
                                            Verlegedatum
                                            <input type="date" x-model="form.verlegedatum" :disabled="saving">
                                        </label>
                                        <label style="margin:0;">
                                            Status
                                            <select x-model="form.status" :disabled="saving">
                                                <option value="neu">Neu</option>
                                                <option value="validierung">In Validierung</option>
                                                <option value="freigegeben">Freigegeben</option>
                                                <option value="archiviert">Archiviert</option>
                                                <option value="fehlerhaft">Fehlerhaft</option>
                                            </select>
                                        </label>
                                        <label style="margin:0;">
                                            Zustand
                                            <select x-model="form.zustand" :disabled="saving">
                                                <option value="verfuegbar">Verfügbar</option>
                                                <option value="stein_fehlend">Stein fehlend</option>
                                                <option value="kein_stein">Kein Stein</option>
                                                <option value="beschaedigt">Beschädigt</option>
                                                <option value="unleserlich">Unleserlich</option>
                                            </select>
                                        </label>
                                    </div>

                                    <!-- Inschrift -->
                                    <label style="margin-top:var(--pico-spacing);">
                                        Inschrift
                                        <textarea x-model="form.inschrift" rows="3" :disabled="saving"
                                                  placeholder="Inschrift des Stolpersteins …"
                                                  @paste="inschriftEinfuegen($event)"></textarea>
                                    </label>

                                    <!-- Wikidata + OSM -->
                                    <div class="grid">
                                        <label style="margin:0;">
                                            Wikidata-ID Stein
                                            <div style="display:flex; align-items:center; gap:0.4rem; margin-top:0.25rem;">
                                                <input type="text" x-model="form.wikidata_id_stein"
                                                       placeholder="Q12345" :disabled="saving"
                                                       style="margin:0; flex:1;">
                                                <button type="button" class="btn-icon btn-wikidata"
                                                        :disabled="!form.wikidata_id_stein"
                                                        @click="window.open('https://www.wikidata.org/wiki/' + form.wikidata_id_stein, '_blank')"
                                                        title="Wikidata öffnen" aria-label="Wikidata öffnen">
                                                    <span x-html="ICONS.wikidata"></span>
                                                </button>
                                            </div>
                                        </label>
                                        <label style="margin:0;">
                                            OSM-ID
                                            <div style="display:flex; align-items:center; gap:0.4rem; margin-top:0.25rem;">
                                                <input type="number" x-model="form.osm_id"
                                                       placeholder="123456789" :disabled="saving"
                                                       style="margin:0; flex:1;">
                                                <button type="button" class="btn-icon btn-osm"
                                                        :disabled="!form.osm_id"
                                                        @click="window.open('https://www.openstreetmap.org/node/' + form.osm_id, '_blank')"
                                                        title="OpenStreetMap öffnen" aria-label="OpenStreetMap öffnen">
                                                    <span x-html="ICONS.osm"></span>
                                                </button>
                                            </div>
                                        </label>
                                    </div>

                                    <!-- Foto -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-top:var(--pico-spacing); margin-bottom:0;">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Foto</legend>

                                        <!-- Upload (alle Nutzer) -->
                                        <div style="margin-bottom:0.6rem;">
                                            <span style="font-size:0.85rem; display:block; margin-bottom:0.25rem;">Foto hochladen</span>
                                            <!-- Create-Modus: lokale Preview der gepufferten Datei -->
                                            <template x-if="editId === null && fotoPreviewUrl">
                                                <div style="margin-bottom:0.4rem; display:flex; align-items:center; gap:0.5rem;">
                                                    <img :src="fotoPreviewUrl" alt="Vorschau"
                                                         style="max-height:80px; max-width:120px; object-fit:contain; border-radius:4px; border:1px solid var(--pico-muted-border-color);">
                                                    <button type="button" class="btn-icon btn-outlined btn-delete"
                                                            @click="fotoLoeschen()"
                                                            title="Foto entfernen" aria-label="Foto entfernen">✕
                                                    </button>
                                                    <span style="font-size:0.8rem; color:var(--pico-muted-color);">Wird nach dem Speichern hochgeladen.</span>
                                                </div>
                                            </template>
                                            <div style="display:flex; align-items:center; gap:0.4rem;">
                                                <input type="file" id="st-foto-upload"
                                                       accept="image/jpeg,image/png,image/webp,image/tiff"
                                                       :disabled="fotoLaden"
                                                       @change="fotoHochladen($event)"
                                                       style="margin:0; flex:1; font-size:0.85rem;">
                                                <template x-if="editId !== null && form.foto_pfad">
                                                    <button type="button" class="btn-icon btn-outlined btn-delete"
                                                            :disabled="fotoLaden"
                                                            @click="fotoLoeschen()"
                                                            title="Foto entfernen" aria-label="Foto entfernen">✕
                                                    </button>
                                                </template>
                                            </div>
                                            <template x-if="fotoFehler">
                                                <p style="color:var(--pico-del-color); font-size:0.8rem; margin:0.25rem 0 0;" x-text="fotoFehler"></p>
                                            </template>
                                        </div>

                                        <!-- Eigenes Foto -->
                                        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.6rem; cursor:pointer;">
                                            <input type="checkbox" x-model="form.foto_eigenes" :value="true"
                                                   style="margin:0; width:auto;">
                                            <span style="font-size:0.85rem;">Eigenes Foto (kein Lizenzhinweis)</span>
                                        </label>

                                        <!-- Wikimedia Commons -->
                                        <div>
                                            <span style="font-size:0.85rem; display:block; margin-bottom:0.25rem;">Wikimedia Commons</span>
                                            <div style="display:flex; align-items:center; gap:0.4rem;">
                                                <input type="text" x-model="form.wikimedia_commons_eingabe"
                                                       @input="commonsEingabeNormalisieren()"
                                                       placeholder="Dateiname.jpg oder Commons-URL"
                                                       :disabled="saving || fotoLaden"
                                                       style="margin:0; flex:1; font-size:0.85rem;">
                                                <!-- Commons-Link-Button -->
                                                <button type="button" class="btn-icon btn-wikidata"
                                                        :disabled="!form.wikimedia_commons"
                                                        @click="window.open('https://commons.wikimedia.org/wiki/File:' + form.wikimedia_commons, '_blank')"
                                                        title="Commons-Seite öffnen" aria-label="Commons öffnen">
                                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                                                        <circle cx="12" cy="12" r="10" fill="#006699"/>
                                                        <path d="M12 4a8 8 0 100 16A8 8 0 0012 4zm0 2.5l2.5 4.5H9.5L12 6.5zm-4.5 5.5h9l-4.5 5-4.5-5z" fill="white"/>
                                                    </svg>
                                                </button>
                                                <!-- Commons importieren (nur Admins) -->
                                                <template x-if="$store.auth.isAdmin">
                                                    <button type="button"
                                                            :disabled="!form.wikimedia_commons || fotoLaden"
                                                            :aria-busy="fotoLaden && editId !== null"
                                                            @click="commonsImportieren()"
                                                            style="margin:0; font-size:0.8rem; padding:0.3rem 0.6rem;"
                                                            title="Bild lokal von Commons herunterladen">
                                                        ↓ Von Commons herunterladen
                                                    </button>
                                                </template>
                                            </div>
                                            <template x-if="commonsImportAusstehend">
                                                <p style="font-size:0.8rem; color:var(--pico-muted-color); margin:0.2rem 0 0;">
                                                    Import wird nach dem Speichern ausgefuhrt.
                                                </p>
                                            </template>
                                            <template x-if="form.wikimedia_commons && form.wikimedia_commons !== form.wikimedia_commons_eingabe">
                                                <p style="font-size:0.75rem; color:var(--pico-muted-color); margin:0.2rem 0 0;">
                                                    Gespeichert als: <span x-text="form.wikimedia_commons" style="font-family:monospace;"></span>
                                                </p>
                                            </template>
                                        </div>
                                    </fieldset>

                                    <!-- Foto-Vorschau (sobald Commons-Dateiname eingetragen) -->
                                    <template x-if="form.wikimedia_commons">
                                        <div style="margin-top:0.75rem; border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); overflow:hidden;">
                                            <!-- Statusbalken (nur wenn lokales Foto vorhanden) -->
                                            <template x-if="form.foto_pfad">
