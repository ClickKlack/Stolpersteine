                                </template>
                                <template x-if="orte.length > 0">
                                    <figure style="overflow-x:auto;">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>Adresse</th>
                                                    <th>PLZ</th>
                                                    <th>Stadt</th>
                                                    <th>Stadtteil</th>
                                                    <th>Koordinaten</th>
                                                    <th style="width:1%;">Aktionen</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="ort in orte" :key="ort.id">
                                                    <tr class="tr-clickable" @click="openEdit(ort)">
                                                        <td>
                                                            <span x-text="adresseAnzeige(ort)"></span>
                                                            <button class="btn-icon btn-wikidata" x-show="ort.wikidata_id_strasse"
                                                                    @click.stop="window.open('https://www.wikidata.org/wiki/' + ort.wikidata_id_strasse, '_blank')"
                                                                    title="Wikidata Straße" aria-label="Wikidata Straße öffnen">
                                                                <span x-html="ICONS.wikidata"></span>
                                                            </button>
                                                        </td>
                                                        <td x-text="ort.plz_aktuell || '–'"></td>
                                                        <td>
                                                            <span x-text="ort.stadt || '–'"></span>
                                                            <button class="btn-icon btn-wikidata" x-show="ort.wikidata_id_ort"
                                                                    @click.stop="window.open('https://www.wikidata.org/wiki/' + ort.wikidata_id_ort, '_blank')"
                                                                    title="Wikidata Ort" aria-label="Wikidata Ort öffnen">
                                                                <span x-html="ICONS.wikidata"></span>
                                                            </button>
                                                        </td>
                                                        <td>
                                                            <span x-text="ort.stadtteil || '–'"></span>
                                                            <button class="btn-icon btn-wikidata" x-show="ort.wikidata_id_stadtteil"
                                                                    @click.stop="window.open('https://www.wikidata.org/wiki/' + ort.wikidata_id_stadtteil, '_blank')"
                                                                    title="Wikidata Stadtteil" aria-label="Wikidata Stadtteil öffnen">
                                                                <span x-html="ICONS.wikidata"></span>
                                                            </button>
                                                        </td>
                                                        <td>
                                                            <template x-if="ort.lat && ort.lon">
                                                                <button type="button" class="btn-koordinaten"
                                                                        @click.stop="openMapPreview(ort)"
                                                                        x-text="koordinatenAnzeige(ort)"
                                                                        title="Auf Karte anzeigen"></button>
                                                            </template>
                                                            <template x-if="!ort.lat || !ort.lon">
                                                                <span style="font-size:0.8rem; color:var(--pico-muted-color);">–</span>
                                                            </template>
                                                        </td>
                                                        <td style="white-space:nowrap; text-align:right;">
                                                            <button class="btn-icon" @click.stop="openEdit(ort)" title="Bearbeiten" aria-label="Bearbeiten">
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                                                                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                                                                </svg>
                                                            </button>
                                                            <button class="btn-icon btn-delete" x-show="auth.isAdmin" @click.stop="openDelete(ort)" title="Löschen" aria-label="Löschen">
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                                                                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                                                                </svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </figure>
                                </template>
                            </div>
                        </template>

                        <!-- Modal: Anlegen / Bearbeiten -->
                        <dialog :open="modalOpen" @keydown.escape.window="if(modalOpen) closeModal()">
                            <article>
                                <header>
                                    <h3 x-text="modalMode === 'create' ? 'Neuer Verlegeort' : 'Verlegeort bearbeiten'"></h3>
                                </header>

                                <form @submit.prevent="save()">

                                    <!-- Adresse -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Adresse</legend>

                                        <!-- Gewählte Adresse anzeigen -->
                                        <template x-if="adresse">
                                            <div>
                                                <div class="adresse-block">
                                                    <span style="display:flex; flex-wrap:wrap; align-items:center; gap:0.4rem; flex:1;">
                                                        <span x-text="adresse.strasse_name"></span>
                                                        <button type="button" class="btn-icon btn-wikidata" x-show="adresse.wikidata_id_strasse"
                                                                @click="window.open('https://www.wikidata.org/wiki/' + adresse.wikidata_id_strasse, '_blank')"
                                                                title="Wikidata Straße" aria-label="Wikidata Straße öffnen">
                                                            <span x-html="ICONS.wikidata"></span>
                                                        </button>
                                                        <template x-if="adresse.plz || adresse.stadt_name || adresse.stadtteil_name">
                                                            <span style="color:var(--pico-muted-color);">·</span>
                                                        </template>
                                                        <span x-show="adresse.plz" x-text="adresse.plz"></span>
                                                        <template x-if="adresse.stadt_name">
                                                            <span style="display:contents;">
                                                                <span x-text="adresse.stadt_name"></span>
                                                                <button type="button" class="btn-icon btn-wikidata" x-show="adresse.wikidata_id_ort"
                                                                        @click="window.open('https://www.wikidata.org/wiki/' + adresse.wikidata_id_ort, '_blank')"
                                                                        title="Wikidata Ort" aria-label="Wikidata Ort öffnen">
                                                                    <span x-html="ICONS.wikidata"></span>
                                                                </button>
                                                            </span>
                                                        </template>
                                                        <template x-if="adresse.stadtteil_name">
                                                            <span style="display:contents;">
                                                                <span style="color:var(--pico-muted-color);">·</span>
                                                                <span x-text="adresse.stadtteil_name"></span>
                                                                <button type="button" class="btn-icon btn-wikidata" x-show="adresse.wikidata_id_stadtteil"
                                                                        @click="window.open('https://www.wikidata.org/wiki/' + adresse.wikidata_id_stadtteil, '_blank')"
                                                                        title="Wikidata Stadtteil" aria-label="Wikidata Stadtteil öffnen">
                                                                    <span x-html="ICONS.wikidata"></span>
                                                                </button>
                                                            </span>
                                                        </template>
                                                    </span>
                                                    <button type="button" class="outline" style="padding:0.2rem 0.6rem; font-size:0.8rem;"
                                                            @click="adresseZuruecksetzen()" :disabled="saving">
                                                        Ändern
                                                    </button>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- Lookup-Widget (wenn noch keine Adresse gewählt) -->
                                        <template x-if="!adresse">
                                            <div>
                                                <div class="lookup-wrapper">
                                                    <input id="v-lookup" type="text"
                                                           x-model="lookup.query"
                                                           @input.debounce.300ms="strasseSuchen()"
                                                           @focus="if(lookup.ergebnisse.length) lookup.offen = true"
                                                           @keydown.escape="lookup.offen = false"
                                                           placeholder="Straße suchen …"
                                                           :disabled="saving"
                                                           autocomplete="off"
                                                           style="margin-bottom:0;">

                                                    <div class="lookup-dropdown" x-show="lookup.offen" @click.outside="lookup.offen = false">
                                                        <template x-if="lookup.loading">
                                                            <div class="lookup-item lookup-loading">Suche …</div>
                                                        </template>

                                                            <div>
                                                                <template x-for="strasse in lookup.ergebnisse" :key="strasse.id">
                                                                    <div>

                                                                            <div class="lookup-item"
                                                                                 @click="neueAdresse = { aktiv: true, strasse_name: strasse.name, wikidata_id_strasse: strasse.wikidata_id || '', stadtteil_name: '', wikidata_id_stadtteil: '', plz: '', stadt_name: strasse.stadt_name, wikidata_id_ort: strasse.wikidata_id_ort || '', saving: false, error: null }; lookup.offen = false;">
                                                                                <span x-text="strasse.name"></span>
                                                                                <small x-text="strasse.stadt_name"></small>
                                                                            </div>
                                                                        </template>
                                                                        <!-- Straße mit einer Lokation: direkt auswählen -->
                                                                        <template x-if="strasse.lokationen.length === 1">
                                                                            <div class="lookup-item" @click="lokationWaehlen(strasse, strasse.lokationen[0])">
                                                                                <span x-text="strasse.name"></span>
                                                                                <small x-text="[strasse.lokationen[0].plz, strasse.lokationen[0].stadtteil_name].filter(Boolean).join(', ') || strasse.stadt_name"></small>
                                                                            </div>
                                                                        </template>
                                                                        <!-- Straße mit mehreren Lokationen: einzeln aufklappen -->
                                                                        <template x-if="strasse.lokationen.length > 1">
                                                                            <div>
                                                                                <div class="lookup-item" style="font-weight:500; cursor:default;">
                                                                                    <span x-text="strasse.name"></span>
                                                                                    <small x-text="strasse.stadt_name"></small>
                                                                                </div>
                                                                                <template x-for="lok in strasse.lokationen" :key="lok.id">
                                                                                    <div class="lookup-item" style="padding-left:1.5rem;" @click="lokationWaehlen(strasse, lok)">
                                                                                        <span x-text="[lok.plz, lok.stadtteil_name].filter(Boolean).join(', ') || '–'"></span>
                                                                                    </div>
                                                                                </template>
                                                                            </div>
                                                                        </template>
                                                                    </div>
                                                                </template>
                                                                <div class="lookup-item lookup-new" @click="neueAdresseStarten()">
                                                                    + Neue Adresse anlegen
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>

                                                <!-- Inline-Formular: Neue Adresse -->
                                                <template x-if="neueAdresse.aktiv">
                                                    <div style="margin-top:0.75rem; padding:0.75rem; background:color-mix(in srgb, var(--pico-secondary-background) 20%, transparent); border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius);">
                                                        <p style="font-size:0.85rem; font-weight:600; margin:0 0 0.5rem;">Neue Adresse</p>
                                                        <div class="grid">
                                                            <label style="margin:0;">
                                                                <span style="font-size:0.8rem;">Straße *</span>
                                                                <input type="text" x-model="neueAdresse.strasse_name" :disabled="neueAdresse.saving" style="margin:0;">
                                                            </label>
                                                            <label style="margin:0;">
                                                                <span style="font-size:0.8rem;">Wikidata Straße</span>
                                                                <input type="text" x-model="neueAdresse.wikidata_id_strasse" placeholder="Q12345" :disabled="neueAdresse.saving" style="margin:0;">
                                                            </label>
                                                        </div>
                                                        <div class="grid" style="margin-top:0.4rem;">
                                                            <label style="margin:0;">
                                                                <span style="font-size:0.8rem;">Stadtteil</span>
                                                                <input type="text" x-model="neueAdresse.stadtteil_name" :disabled="neueAdresse.saving" style="margin:0;">
                                                            </label>
                                                            <label style="margin:0;">
                                                                <span style="font-size:0.8rem;">Wikidata Stadtteil</span>
                                                                <input type="text" x-model="neueAdresse.wikidata_id_stadtteil" placeholder="Q12345" :disabled="neueAdresse.saving" style="margin:0;">
                                                            </label>
                                                        </div>
                                                        <div class="grid" style="margin-top:0.4rem;">
                                                            <label style="margin:0;">
                                                                <span style="font-size:0.8rem;">PLZ</span>
                                                                <input type="text" x-model="neueAdresse.plz" :disabled="neueAdresse.saving" style="margin:0;">
                                                            </label>
                                                            <label style="margin:0;">
                                                                <span style="font-size:0.8rem;">Stadt *</span>
                                                                <input type="text" x-model="neueAdresse.stadt_name" :disabled="neueAdresse.saving" style="margin:0;">
                                                            </label>
                                                        </div>
                                                        <label style="margin-top:0.4rem; margin-bottom:0;">
                                                            <span style="font-size:0.8rem;">Wikidata Ort</span>
                                                            <input type="text" x-model="neueAdresse.wikidata_id_ort" placeholder="Q1733" :disabled="neueAdresse.saving" style="margin:0;">
                                                        </label>
                                                        <template x-if="neueAdresse.error">
                                                            <p style="color:var(--pico-del-color); font-size:0.85rem; margin:0.4rem 0 0;" x-text="neueAdresse.error"></p>
                                                        </template>
                                                        <div style="display:flex; gap:0.5rem; margin-top:0.6rem;">
                                                            <button type="button" class="outline" style="margin:0; padding:0.35rem 0.75rem; font-size:0.85rem;"
                                                                    @click="neueAdresse.aktiv = false" :disabled="neueAdresse.saving">
                                                                Abbrechen
                                                            </button>
                                                            <button type="button" style="margin:0; padding:0.35rem 0.75rem; font-size:0.85rem;"
                                                                    @click="neueAdresseSpeichern()" :aria-busy="neueAdresse.saving" :disabled="neueAdresse.saving">
                                                                Adresse übernehmen
                                                            </button>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <!-- Hausnummer (immer sichtbar) -->
                                        <label style="margin-top:0.6rem; margin-bottom:0;">
                                            Hausnummer
                                            <input type="text" x-model="form.hausnummer_aktuell" :disabled="saving" style="margin:0;">
                                        </label>
                                    </fieldset>

                                    <!-- Koordinaten -->
                                    <fieldset style="border:1px solid var(--pico-table-border-color); border-radius:var(--pico-border-radius); padding:0.75rem; margin-bottom:var(--pico-spacing);">
                                        <legend style="font-size:0.85rem; padding:0 0.4rem; color:var(--pico-muted-color);">Koordinaten</legend>
                                        <div class="grid">
                                            <label style="margin:0;">
                                                Breitengrad (lat)
                                                <input type="number" x-model="form.lat" step="0.00000001" placeholder="52.13000000" :disabled="saving"
                                                       @change="updateEditMapMarker()">
                                            </label>
                                            <label style="margin:0;">
                                                Längengrad (lon)
                                                <input type="number" x-model="form.lon" step="0.00000001" placeholder="11.62000000" :disabled="saving"
                                                       @change="updateEditMapMarker()">
                                            </label>
                                        </div>
                                        <div id="map-edit" style="height:280px; margin-top:0.75rem; border-radius:var(--pico-border-radius); overflow:hidden;"></div>
                                        <p style="font-size:0.8rem; color:var(--pico-muted-color); margin:0.4rem 0 0;">Auf die Karte klicken oder Marker ziehen, um Koordinaten zu setzen.</p>
                                    </fieldset>

                                    <label>
                                        Beschreibung
                                        <textarea x-model="form.beschreibung" rows="2" :disabled="saving" placeholder="z.B. vor dem Eingang, linke Seite …"></textarea>
                                    </label>

                                    <label>
                                        Historische Bemerkung
                                        <textarea x-model="form.bemerkung_historisch" rows="2" :disabled="saving" placeholder="Frühere Adresse, Umbenennungen …"></textarea>
                                    </label>

                                    <template x-if="formError">
                                        <p style="color:var(--pico-del-color);" x-text="formError"></p>
                                    </template>

                                    <footer style="display:flex; justify-content:flex-end; gap:0.5rem;">
                                        <button type="button" class="outline" @click="closeModal()" :disabled="saving">Abbrechen</button>
                                        <button type="submit" :aria-busy="saving" :disabled="saving">Speichern</button>
                                    </footer>
                                </form>
                            </article>
                        </dialog>

                        <!-- Modal: Kartenvorschau -->
                        <dialog :open="mapPreview.open" @keydown.escape.window="if(mapPreview.open) closeMapPreview()">
                            <article style="max-width:560px;">
                                <header style="display:flex; align-items:center; justify-content:space-between;">
                                    <h3 style="margin:0;" x-text="mapPreview.adresse"></h3>
                                    <button type="button" class="btn-icon" @click="closeMapPreview()" aria-label="Schließen"
                                            style="font-size:1rem; font-weight:700; margin:0;">✕</button>
                                </header>
                                <div id="map-preview" style="height:340px; border-radius:var(--pico-border-radius); overflow:hidden;"></div>
                            </article>
                        </dialog>

                        <!-- Modal: Löschen bestätigen -->
                        <dialog :open="deleteConfirmOpen" @keydown.escape.window="if(deleteConfirmOpen) closeDelete()">
                            <article>
                                <header><h3>Verlegeort löschen</h3></header>
                                <p>

                                </p>
                                <footer style="display:flex; justify-content:flex-end; gap:0.5rem;">
                                    <button class="outline" @click="closeDelete()" :disabled="deleting">Abbrechen</button>
                                    <button style="background:var(--pico-del-color); border-color:var(--pico-del-color);"
                                            @click="doDelete()" :aria-busy="deleting" :disabled="deleting">
                                        Löschen

                                </footer>
                            </article>
                        </dialog>

                    </div>
                </template>

                <!-- Dokumente (Platzhalter) -->
                <template x-if="router.is('dokumente')">

                        <div class="page-placeholder">

                        </div>
                    </div>
                </template>

                <!-- Suche (Platzhalter) -->
                <template x-if="router.is('suche')">
                    <div>
                        <div class="page-placeholder">
                            <h2>Suche</h2>
                            <p>Diese Seite wird in der nächsten Phase implementiert.</p>
                        </div>
                    </div>
                </template>

                <template x-if="router.is('import')">
                    <div>
                        <div class="page-placeholder">
                            <h2>Import</h2>
                            <p>Diese Seite wird in der nächsten Phase implementiert.</p>
                        </div>
                    </div>
                </template>

                <!-- Benutzerverwaltung (Platzhalter, nur Admin) -->
                <template x-if="router.is('benutzerverwaltung')">
                    <div>
                        <div class="page-placeholder">
                            <h2>Benutzerverwaltung</h2>
                            <p>Diese Seite wird in der nächsten Phase implementiert.</p>
                        </div>
                    </div>
                </template>

                <!-- Profil -->
                <template x-if="router.is('profil')">
                    <div>
                        <div class="page-placeholder">
                            <h2>Mein Profil</h2>
                            <p>
                                Angemeldet als <strong x-text="auth.user.benutzername"></strong>

                        </div>
                    </div>
                </template>

            </main>
        </div>
    </template>

    <!-- ----------------------------------------------------------------
         TOAST-BENACHRICHTIGUNGEN
         ---------------------------------------------------------------- -->
    <div
        x-show="notify.message"
        x-transition
        :class="['toast', notify.type]"
        role="alert"
    >
        <span x-text="notify.message"></span>
        <button @click="notify.dismiss()" aria-label="Schließen">✕</button>
    </div>

</div>

<!-- Alpine.js: immer als letztes laden -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

</body>
</html>
